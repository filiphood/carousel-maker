<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Carousel Maker · v2</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --panel-bg: #161616;
    --panel-2: #1f1f1f;
    --panel-3: #262626;
    --panel-line: #2c2c2c;
    --accent: #f4d784;
    --accent-2: #a88cf4;
    --ink: #e9e9e9;
    --ink-soft: #9a9a9a;
    --ink-dim: #6c6c6c;
    --danger: #e26c6c;
  }

  html, body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--panel-bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    height: 100%;
    overflow: hidden;
  }

  .app { display: grid; grid-template-columns: 440px 1fr; height: 100vh; }

  .controls { overflow-y: auto; background: var(--panel-bg); border-right: 1px solid var(--panel-line); }
  .controls::-webkit-scrollbar { width: 10px; }
  .controls::-webkit-scrollbar-thumb { background: #333; border-radius: 5px; }

  .app-header {
    padding: 20px 24px 14px;
    border-bottom: 1px solid var(--panel-line);
    position: sticky;
    top: 0;
    background: var(--panel-bg);
    z-index: 20;
  }
  .app-header h1 { font-size: 15px; font-weight: 900; letter-spacing: 0.08em; text-transform: uppercase; }
  .app-header p { font-size: 11px; color: var(--ink-dim); margin-top: 4px; letter-spacing: 0.02em; }

  /* Carousel switcher bar */
  .car-bar { padding: 14px 24px; border-bottom: 1px solid var(--panel-line); background: #1b1b1b; }
  .car-row { display: flex; gap: 6px; align-items: center; }
  .car-row select { flex: 1; }
  .car-meta { font-size: 10px; color: var(--ink-dim); margin-top: 8px; letter-spacing: 0.02em; }

  .section { padding: 18px 24px; border-bottom: 1px solid var(--panel-line); }
  .section-title {
    font-size: 11px; font-weight: 900; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--ink-soft);
    margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between;
  }
  .section-title .dim { font-weight: 400; color: var(--ink-dim); letter-spacing: 0.02em; text-transform: none; font-size: 11px; }

  .field { margin-bottom: 12px; }
  .field:last-child { margin-bottom: 0; }
  .field label {
    display: block; font-size: 11px; color: var(--ink-soft);
    margin-bottom: 6px; letter-spacing: 0.02em;
  }
  .field-row { display: flex; gap: 10px; align-items: center; }
  .field-row > * { flex: 1; }
  .field-row .shrink { flex: 0 0 auto; }

  input[type="text"], input[type="number"], textarea, select {
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--panel-line);
    color: var(--ink);
    padding: 8px 10px;
    font-size: 13px;
    font-family: inherit;
    border-radius: 6px;
    outline: none;
    transition: border-color .12s;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  textarea { min-height: 60px; resize: vertical; line-height: 1.4; }
  input[type="range"] { width: 100%; accent-color: var(--accent); }
  input[type="color"] {
    width: 42px; height: 32px; border: 1px solid var(--panel-line);
    border-radius: 6px; background: var(--panel-2); cursor: pointer; padding: 2px;
  }
  input[type="checkbox"] { accent-color: var(--accent); width: 16px; height: 16px; }
  input[type="file"] { width: 100%; font-size: 12px; color: var(--ink-soft); }
  input[type="file"]::file-selector-button {
    background: var(--panel-3); border: 1px solid var(--panel-line); color: var(--ink);
    padding: 6px 10px; border-radius: 5px; cursor: pointer;
    font-family: inherit; font-size: 12px; margin-right: 8px;
  }

  .btn {
    background: var(--panel-3); border: 1px solid var(--panel-line); color: var(--ink);
    padding: 8px 14px; border-radius: 6px; cursor: pointer;
    font-family: inherit; font-size: 12px; font-weight: 600; letter-spacing: 0.02em;
    transition: background .12s, border-color .12s;
  }
  .btn:hover { background: #303030; border-color: #3a3a3a; }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #1a1a1a; }
  .btn.primary:hover { background: #f0c968; border-color: #f0c968; }
  .btn.secondary { background: var(--accent-2); border-color: var(--accent-2); color: #1a1a1a; }
  .btn.secondary:hover { background: #9175e8; border-color: #9175e8; }
  .btn.danger { color: var(--danger); }
  .btn.danger:hover { background: #3a1f1f; border-color: #5a2828; }
  .btn.small { padding: 4px 8px; font-size: 11px; }
  .btn.full { width: 100%; }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

  /* Cards (slides + themes) */
  .card {
    background: var(--panel-2); border: 1px solid var(--panel-line); border-radius: 8px;
    margin-bottom: 10px; overflow: hidden;
  }
  .card-head {
    padding: 10px 12px; background: var(--panel-3); cursor: pointer; user-select: none;
    display: flex; justify-content: space-between; align-items: center; gap: 8px;
  }
  .card-head h3 { font-size: 12px; font-weight: 900; letter-spacing: 0.05em; }
  .card-head .sub { font-size: 10px; color: var(--ink-dim); font-weight: 400; letter-spacing: 0.02em; margin-top: 2px; }
  .card-body { padding: 14px 12px; display: none; }
  .card.open .card-body { display: block; }
  .card.open .chev { transform: rotate(180deg); }
  .chev { font-size: 10px; color: var(--ink-dim); transition: transform .12s; }
  .card-actions { display: flex; gap: 4px; align-items: center; }

  .slider-val {
    font-variant-numeric: tabular-nums; color: var(--ink-soft);
    font-size: 11px; min-width: 34px; text-align: right;
  }

  .chip-group { display: flex; gap: 4px; flex-wrap: wrap; }
  .chip {
    background: var(--panel-3); border: 1px solid var(--panel-line); color: var(--ink-soft);
    padding: 5px 9px; border-radius: 5px; font-size: 11px; cursor: pointer; transition: all .12s;
  }
  .chip:hover { color: var(--ink); border-color: #3a3a3a; }
  .chip.active { background: var(--accent); color: #1a1a1a; border-color: var(--accent); font-weight: 600; }

  .theme-swatch {
    width: 18px; height: 18px; border-radius: 4px; border: 1px solid #00000022;
    display: inline-block; vertical-align: middle; margin-right: 6px;
  }

  /* Preview pane */
  .preview {
    overflow-y: auto; background: #0f0f0f;
    padding: 40px 24px 96px;
    display: flex; flex-direction: column; align-items: center; gap: 48px;
  }
  .preview::-webkit-scrollbar { width: 10px; }
  .preview::-webkit-scrollbar-thumb { background: #333; border-radius: 5px; }

  .preview-note {
    color: var(--ink-dim); font-size: 12px; letter-spacing: 0.02em;
    text-align: center; max-width: 640px; line-height: 1.6;
  }
  .preview-title {
    color: var(--ink); font-size: 15px; font-weight: 900; letter-spacing: 0.06em;
    text-transform: uppercase; margin-top: 8px;
  }

  .slide-stage { position: relative; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .slide-stage-meta {
    font-size: 11px; color: var(--ink-dim); letter-spacing: 0.1em;
    text-transform: uppercase; display: flex; gap: 16px; align-items: center;
  }
  .slide-stage-meta .dl {
    color: var(--accent); cursor: pointer; user-select: none;
    letter-spacing: 0.05em; text-transform: none; font-weight: 600;
  }
  .slide-stage-meta .dl:hover { text-decoration: underline; }

  .slide-box {
    width: 540px; height: 675px;
    position: relative; box-shadow: 0 20px 60px rgba(0,0,0,0.5); overflow: hidden;
  }
  .slide-box > .slide-inner {
    width: 1080px; height: 1350px;
    transform: scale(0.5); transform-origin: top left;
    position: absolute; top: 0; left: 0;
  }

  /* Slide content styles */
  .slide-inner {
    font-family: 'Inter', sans-serif;
    color: var(--ink-slide, #111);
    background-color: var(--bg-slide, #f2ede3);
    position: relative;
    padding: 140px 120px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .slide-inner.has-pattern {
    background-image: var(--pattern-image);
    background-size: var(--pattern-size);
    background-position: var(--pattern-position);
  }
  /* Accent layer (::before) — masked radial hotspot or band */
  .slide-inner.has-accent::before {
    content: "";
    position: absolute; inset: 0;
    background-image: var(--accent-image);
    background-size: var(--accent-size);
    background-position: var(--accent-position);
    -webkit-mask-image: var(--accent-mask);
    mask-image: var(--accent-mask);
    -webkit-mask-size: 100% 100%;
    mask-size: 100% 100%;
    -webkit-mask-repeat: no-repeat;
    mask-repeat: no-repeat;
    pointer-events: none;
    z-index: 0;
  }
  /* Slide content sits above the accent layer.
     Already-absolute elements keep their anchoring, just bumped in z-index.
     Flow elements get position:relative so z-index applies. */
  .slide-inner.has-accent > .slide-mark,
  .slide-inner.has-accent > .slide-footer,
  .slide-inner.has-accent > .slide-icon,
  .slide-inner.has-accent > .cover-copy {
    z-index: 1;
  }
  .slide-inner.has-accent > .slide-headline,
  .slide-inner.has-accent > .slide-soft,
  .slide-inner.has-accent > .slide-subtitle,
  .slide-inner.has-accent > .slide-body,
  .slide-inner.has-accent > .slide-tag,
  .slide-inner.has-accent > .slide-image,
  .slide-inner.has-accent > .slide-image-placeholder,
  .slide-inner.has-accent > .slide-prompt,
  .slide-inner.has-accent > .slide-compare-grid,
  .slide-inner.has-accent > .slide-list,
  .slide-inner.has-accent > .slide-caption {
    position: relative;
    z-index: 1;
  }

  .slide-inner.align-left { text-align: left; align-items: flex-start; }
  .slide-inner.align-center { text-align: center; align-items: center; }
  .slide-inner.align-right { text-align: right; align-items: flex-end; }

  .slide-headline {
    font-family: 'Inter', sans-serif; font-weight: 900;
    line-height: 0.98; letter-spacing: -0.045em; color: inherit;
    white-space: pre-wrap;
  }
  .slide-soft {
    font-family: 'Apple Garamond', 'ITC Garamond Std', 'Garamond', 'Hoefler Text', 'Times New Roman', serif;
    font-style: italic; line-height: 1.18; letter-spacing: -0.005em;
    color: inherit; white-space: pre-wrap;
  }

  .slide-inner.cta .slide-headline { line-height: 0.9; letter-spacing: -0.06em; }
  .slide-inner.cta .slide-soft.lead { margin-bottom: 56px; }
  .slide-inner.cta .slide-soft.why { margin-top: 56px; }

  .slide-inner.order-ab .slide-soft { margin-bottom: 40px; }
  .slide-inner.order-ba .slide-soft { margin-top: 40px; }

  .slide-inner.cover {
    padding: 0; background-color: #1a1a1a;
  }
  .slide-inner.cover.no-photo {
    background-image: radial-gradient(120% 80% at 50% 40%, #4a463f 0%, #2b2823 45%, #0e0d0b 100%);
    background-size: cover; background-position: center;
  }
  .slide-inner.cover .cover-copy {
    position: absolute; left: 120px; right: 120px; bottom: 180px;
    z-index: 5;
  }
  .slide-inner.cover .slide-headline, .slide-inner.cover .slide-soft { color: #f6f3ec; }

  /* ————— Photo + texture layers (any slide type) ————— */
  .slide-photo, .slide-texture, .slide-dim, .slide-gradient-bottom {
    position: absolute; inset: 0; pointer-events: none;
  }
  .slide-photo {
    background-size: cover;
    background-position: center;
    background-color: #111;
    z-index: 0;
  }
  .slide-photo.filter-grayscale { filter: grayscale(1) contrast(1.02); }
  .slide-photo.filter-sepia { filter: sepia(0.7) saturate(1.1); }
  .slide-photo.filter-dim { filter: brightness(0.6); }
  .slide-photo.filter-faded { filter: grayscale(0.6) brightness(1.05) contrast(0.95); }

  /* Blurred duplicate of the photo, masked to a region */
  .slide-photo-blur {
    position: absolute; inset: 0;
    background-size: cover;
    background-position: center;
    z-index: 0;
    pointer-events: none;
    -webkit-mask-size: 100% 100%;
    mask-size: 100% 100%;
    -webkit-mask-repeat: no-repeat;
    mask-repeat: no-repeat;
  }

  .slide-texture {
    background-repeat: repeat;
    z-index: 1;
  }
  .slide-texture.blend-multiply { mix-blend-mode: multiply; }
  .slide-texture.blend-overlay { mix-blend-mode: overlay; }
  .slide-texture.blend-soft-light { mix-blend-mode: soft-light; }

  .slide-dim {
    background: #000;
    z-index: 2;
  }

  .slide-gradient-bottom {
    background: linear-gradient(180deg, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0) 32%, rgba(0,0,0,0) 55%, rgba(0,0,0,0.85) 100%);
    z-index: 3;
  }

  /* Content sits above all photo layers.
     Already-absolute elements (mark, footer, cover-copy, icon) keep their positioning
     and just get a z-index bump. Flow elements get position:relative so z-index applies. */
  .slide-inner.has-photo .slide-mark,
  .slide-inner.has-photo .slide-footer,
  .slide-inner.has-photo .cover-copy,
  .slide-inner.has-photo .slide-icon {
    z-index: 5;
  }
  .slide-inner.has-photo .slide-headline,
  .slide-inner.has-photo .slide-soft,
  .slide-inner.has-photo .slide-subtitle,
  .slide-inner.has-photo .slide-body {
    position: relative;
    z-index: 5;
  }

  .slide-footer {
    position: absolute; left: 120px; right: 120px; bottom: 80px;
    display: flex; justify-content: space-between; align-items: center;
    font-family: 'Inter', sans-serif; font-weight: 900; font-size: 18px;
    letter-spacing: 0.18em; color: var(--footer-color, #6b6b6b); text-transform: uppercase;
  }
  .slide-inner.cover .slide-footer { color: rgba(246,243,236,0.7); }

  .slide-mark {
    position: absolute; top: 80px; left: 120px;
    width: 28px; height: 28px; border: 3px solid currentColor;
    border-radius: 50%; color: var(--ink-slide, #111);
  }
  .slide-inner.cover .slide-mark { color: #f6f3ec; }

  /* Slide icon (decoration image) */
  .slide-icon {
    position: absolute;
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    pointer-events: none;
  }

  .hint { font-size: 10px; color: var(--ink-dim); margin-top: 4px; font-style: italic; }

  .action-bar {
    position: sticky; bottom: 0; background: var(--panel-bg);
    border-top: 1px solid var(--panel-line);
    padding: 14px 24px; display: flex; flex-direction: column; gap: 8px; z-index: 10;
  }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #1d1d1d; border: 1px solid var(--panel-line); color: var(--ink);
    padding: 12px 20px; border-radius: 8px; font-size: 13px; z-index: 100;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-6px); }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.55);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; backdrop-filter: blur(4px);
  }
  .modal {
    background: var(--panel-2); border: 1px solid var(--panel-line);
    border-radius: 10px; padding: 20px 22px; width: 380px; max-width: 90vw;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
  }
  .modal h3 { font-size: 14px; font-weight: 900; margin-bottom: 12px; letter-spacing: 0.02em; }
  .modal p { font-size: 13px; color: var(--ink-soft); line-height: 1.5; margin-bottom: 14px; }
  .modal-input {
    width: 100%; background: var(--panel-3); border: 1px solid var(--panel-line);
    color: var(--ink); padding: 10px 12px; font-size: 14px; font-family: inherit;
    border-radius: 6px; outline: none; margin-bottom: 14px;
  }
  .modal-input:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

  /* ———————————————————— "info" slide type ———————————————————— */
  .slide-inner.info {
    padding: 160px 140px;
    align-items: flex-start;
    justify-content: flex-start;
  }
  .slide-inner.info .slide-headline {
    font-size: 92px;
    line-height: 1.0;
    letter-spacing: -0.04em;
    margin-bottom: 60px;
  }
  .slide-inner.info .slide-subtitle {
    font-family: 'Apple Garamond', 'ITC Garamond Std', 'Garamond', 'Hoefler Text', 'Times New Roman', serif;
    font-style: italic;
    font-size: 44px;
    line-height: 1.25;
    margin-top: -36px;
    margin-bottom: 60px;
    color: inherit;
    opacity: 0.82;
  }
  .slide-inner.info .slide-body {
    font-family: 'Apple Garamond', 'ITC Garamond Std', 'Garamond', 'Hoefler Text', 'Times New Roman', serif;
    font-style: normal;
    font-weight: 400;
    font-size: 38px;
    line-height: 1.42;
    letter-spacing: -0.003em;
    color: inherit;
    max-width: 780px;
  }
  .slide-inner.info .slide-body p + p { margin-top: 28px; }

  /* ———————————————————— screenshot / prompt / comparison / list — editable slide types ———————————————————— */
  .slide-inner.screenshot,
  .slide-inner.prompt,
  .slide-inner.comparison,
  .slide-inner.list {
    padding: 140px 120px;
    align-items: flex-start;
    justify-content: flex-start;
  }

  .slide-tag {
    font-family: 'Inter', sans-serif;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.25em;
    color: #5c4820;
    margin-bottom: 44px;
    white-space: pre-wrap;
  }

  .slide-inner.screenshot .slide-headline,
  .slide-inner.prompt .slide-headline,
  .slide-inner.comparison .slide-headline,
  .slide-inner.list .slide-headline {
    line-height: 0.98;
    letter-spacing: -0.045em;
    margin-bottom: 56px;
  }

  /* screenshot */
  .slide-inner.screenshot .slide-image {
    width: 100%;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 12px 50px rgba(0,0,0,0.18);
    margin-bottom: 36px;
    background: rgba(0,0,0,0.04);
    max-height: 760px;
  }
  .slide-inner.screenshot .slide-image img {
    display: block;
    width: 100%;
    height: auto;
    max-height: 760px;
    object-fit: cover;
  }
  .slide-inner.screenshot .slide-image-placeholder {
    width: 100%;
    height: 560px;
    border-radius: 18px;
    border: 3px dashed rgba(0,0,0,0.18);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Apple Garamond', serif;
    font-style: italic;
    color: rgba(0,0,0,0.4);
    font-size: 40px;
    margin-bottom: 36px;
  }

  /* prompt */
  .slide-inner.prompt .slide-prompt {
    font-family: 'SFMono-Regular', 'Menlo', 'Consolas', monospace;
    font-size: 30px;
    line-height: 1.5;
    letter-spacing: -0.01em;
    background: rgba(255, 255, 255, 0.55);
    border: 1px solid rgba(0, 0, 0, 0.12);
    border-radius: 18px;
    padding: 48px 44px;
    white-space: pre-wrap;
    word-wrap: break-word;
    color: inherit;
    margin-bottom: 36px;
    width: 100%;
    max-height: 720px;
    overflow: hidden;
  }

  /* comparison */
  .slide-inner.comparison .slide-compare-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
    width: 100%;
    margin-bottom: 36px;
  }
  .slide-inner.comparison .slide-compare-cell {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .slide-inner.comparison .slide-compare-item {
    aspect-ratio: 1 / 1.25;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    background: rgba(0,0,0,0.05);
  }
  .slide-inner.comparison .slide-compare-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .slide-inner.comparison .slide-compare-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Apple Garamond', serif;
    font-style: italic;
    color: rgba(0,0,0,0.4);
    font-size: 28px;
    border: 3px dashed rgba(0,0,0,0.18);
    border-radius: 14px;
  }
  .slide-inner.comparison .slide-compare-label {
    font-family: 'Inter', sans-serif;
    font-weight: 900;
    font-size: 22px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #5c4820;
    text-align: center;
  }

  /* list */
  .slide-inner.list .slide-list {
    list-style: none;
    padding: 0;
    margin: 0 0 36px 0;
    width: 100%;
  }
  .slide-inner.list .slide-list li {
    display: flex;
    gap: 36px;
    align-items: baseline;
    margin-bottom: 32px;
    line-height: 1.2;
  }
  .slide-inner.list .slide-list li:last-child { margin-bottom: 0; }
  .slide-inner.list .slide-list .num {
    font-family: 'Inter', sans-serif;
    font-weight: 900;
    letter-spacing: -0.045em;
    color: inherit;
    flex: 0 0 auto;
    min-width: 72px;
  }
  .slide-inner.list .slide-list .text {

<script>
/* ============================================================
   HELPERS
   ============================================================ */
function hexToRgba(hex, alpha = 1) {
  const h = (hex || "#000").replace("#", "");
  const n = h.length === 3 ? h.split("").map(c => c + c).join("") : h;
  const r = parseInt(n.substring(0, 2), 16) || 0;
  const g = parseInt(n.substring(2, 4), 16) || 0;
  const b = parseInt(n.substring(4, 6), 16) || 0;
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}
function sanitizeHex(v) {
  if (!v) return null;
  if (!v.startsWith("#")) v = "#" + v;
  const m = v.match(/^#[0-9a-f]{3}$|^#[0-9a-f]{6}$/i);
  return m ? v : null;
}
function esc(s) { return (s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
function uid(prefix = "id") { return prefix + "-" + Date.now() + "-" + Math.floor(Math.random() * 9999); }
function toast(msg, ms = 1500) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove("show"), ms);
}

// Generate texture tile as a PNG data URL via HTML5 Canvas.
// Black + white noise pixels with varying alpha → works reliably in html2canvas.
// Cached per type for perf.
function textureDataURL(type) {
  textureDataURL._cache = textureDataURL._cache || {};
  if (textureDataURL._cache[type]) return textureDataURL._cache[type];

  const size = 400;
  const c = document.createElement("canvas");
  c.width = c.height = size;
  const ctx = c.getContext("2d");
  const img = ctx.createImageData(size, size);
  const d = img.data;

  // Seeded pseudo-random — deterministic, tileable-enough
  function rnd(x, y) {
    const s = Math.sin(x * 12.9898 + y * 78.233 + 1.234) * 43758.5453;
    return s - Math.floor(s);
  }

  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      let value = 0;   // 0..1 — how dark (shadows)
      let highlight = 0; // 0..1 — how bright (highlights)

      if (type === "grain") {
        // Fine film grain — high-frequency mix of highlights and shadows
        const n = rnd(x * 1.7, y * 1.7);
        if (n > 0.82) highlight = (n - 0.82) * 5;
        else if (n < 0.18) value = (0.18 - n) * 5;
      } else if (type === "paper") {
        // Horizontally stretched fibers (linen / laid paper)
        const n1 = rnd(x * 0.04, y * 1.1);
        const n2 = rnd(x * 0.12, y * 2.3);
        const m = n1 * 0.65 + n2 * 0.35;
        if (m > 0.68) highlight = (m - 0.68) * 2.5;
        else if (m < 0.32) value = (0.32 - m) * 2.5;
      } else if (type === "canvas") {
        // Cross-hatched weave — vertical and horizontal bias
        const vert = rnd(x * 0.25, y * 1.3);
        const horz = rnd(x * 1.3, y * 0.25);
        const m = Math.abs(vert - horz);
        if (m > 0.55) value = (m - 0.55) * 2;
        else if (m < 0.15) highlight = (0.15 - m) * 3;
      } else {
        continue;
      }

      const idx = (y * size + x) * 4;
      // Shadows win over highlights
      if (value > 0) {
        d[idx] = 0; d[idx + 1] = 0; d[idx + 2] = 0;
        d[idx + 3] = Math.min(255, Math.floor(value * 230));
      } else if (highlight > 0) {
        d[idx] = 255; d[idx + 1] = 255; d[idx + 2] = 255;
        d[idx + 3] = Math.min(255, Math.floor(highlight * 180));
      }
    }
  }

  ctx.putImageData(img, 0, 0);
  const url = `url('${c.toDataURL("image/png")}')`;
  textureDataURL._cache[type] = url;
  return url;
}

// Inline modal replacement for native prompt() — works consistently in all browsers
function askName(title, defaultValue = "", placeholder = "") {
  return new Promise((resolve) => {
    if (document.querySelector(".modal-overlay")) return resolve(null);
    const overlay = document.createElement("div");
    overlay.className = "modal-overlay";
    overlay.innerHTML = `
      <div class="modal">
        <h3>${esc(title)}</h3>
        <input type="text" class="modal-input" value="${esc(defaultValue)}" placeholder="${esc(placeholder)}">
        <div class="modal-actions">
          <button class="btn small" data-act="cancel">Cancel</button>
          <button class="btn small primary" data-act="ok">OK</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    const input = overlay.querySelector(".modal-input");
    input.focus(); input.select();
    const close = (v) => { overlay.remove(); resolve(v); };
    overlay.addEventListener("click", (e) => { if (e.target === overlay) close(null); });
    overlay.querySelector('[data-act="cancel"]').addEventListener("click", () => close(null));
    overlay.querySelector('[data-act="ok"]').addEventListener("click", () => close(input.value.trim() || null));
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); close(input.value.trim() || null); }
      if (e.key === "Escape") close(null);
    });
  });
}

// Modal confirm (for delete actions — more reliable than native confirm in some browsers)
function askConfirm(msg, confirmLabel = "Delete", danger = true) {
  return new Promise((resolve) => {
    if (document.querySelector(".modal-overlay")) return resolve(false);
    const overlay = document.createElement("div");
    overlay.className = "modal-overlay";
    overlay.innerHTML = `
      <div class="modal">
        <p>${esc(msg)}</p>
        <div class="modal-actions">
          <button class="btn small" data-act="cancel">Cancel</button>
          <button class="btn small ${danger ? "danger" : "primary"}" data-act="ok">${esc(confirmLabel)}</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    const close = (v) => { overlay.remove(); resolve(v); };
    overlay.addEventListener("click", (e) => { if (e.target === overlay) close(false); });
    overlay.querySelector('[data-act="cancel"]').addEventListener("click", () => close(false));
    overlay.querySelector('[data-act="ok"]').addEventListener("click", () => close(true));
    document.addEventListener("keydown", function esc(e) {
      if (e.key === "Escape") { close(false); document.removeEventListener("keydown", esc); }
    });
  });
}

function normalizeTheme(t) {

    accentMultiplier: 3, accentScale: 2.6, gridLineWidth: 1,

    accentPositionX: 50,          // 0-100, % across slide (center of hotspot/band)
    accentPositionY: 50,          // 0-100, % down slide
    accentFalloff: 60,            // 10-200 — hotspot radius or band width
    accentAngle: 0,               // 0-180, band direction (0 = horizontal, 90 = vertical)
  };
  if (t.patternType) {
    return { ...defaults, ...t };
  }
  // Migrate from v2.0 (dotsEnabled) to v2.1 (patternType)
  return {
    ...defaults,
    ...t,
    patternType: t.dotsEnabled ? "dots" : "none",
  };
}

/* ============================================================
   STATE (load / save)
   ============================================================ */
const STORAGE_KEY = "carousel-maker.v2";
const STORAGE_KEY_V1 = "carousel-maker.v1";

function normalizeState(s) {
  if (!s || !s.themes) return s;
  Object.keys(s.themes).forEach(id => { s.themes[id] = normalizeTheme(s.themes[id]); });
  return s;
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed.version === 2) return normalizeState(parsed);
    }
    // try migrating from v1
    const v1raw = localStorage.getItem(STORAGE_KEY_V1);
    if (v1raw) {
      const v1 = JSON.parse(v1raw);
      if (v1.version === 1) {
        const migrated = normalizeState(migrateV1(v1));
        localStorage.setItem(STORAGE_KEY, JSON.stringify(migrated));
        toast("✓ Migrated from v1", 2200);
        return migrated;
      }
    }
  } catch (err) { console.warn("loadState failed:", err); }
  return null;
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch { toast("⚠️ Storage full — compress photos", 3000); }
}

let state = loadState() || freshState();

   HELPERS THAT USE STATE
   ============================================================ */
function currentCarousel() {
  return state.carousels[state.currentCarouselId] || Object.values(state.carousels)[0];
}
function slidesOf() { return currentCarousel().slides; }

function getTheme(themeId) {
  if (themeId === "__default__" || !themeId) return normalizeTheme(state.themes[state.defaultThemeId]) || firstTheme();
  return normalizeTheme(state.themes[themeId]) || normalizeTheme(state.themes[state.defaultThemeId]) || firstTheme();
}
function firstTheme() { return normalizeTheme(Object.values(state.themes)[0]); }

// Returns { baseImage, baseSize, basePosition, accentImage?, accentSize?, accentPosition?, accentMask? }
function patternCSS(theme) {
  const type = theme.patternType || "none";
  if (type === "none") return null;

  const color = hexToRgba(theme.dotColor, theme.dotOpacity / 100);
  const sp = theme.dotSpacing || 28;
  const ds = theme.dotSize || 1.6;
  const mult = Math.max(2, Math.min(6, theme.accentMultiplier || 3));
  const scale = Math.max(1, theme.accentScale || 2.6);
  const basePos = `${sp / 2}px ${sp / 2}px`;

  const baseDots = `radial-gradient(circle, ${color} ${ds}px, transparent ${ds}px)`;
  const baseDotsSize = `${sp}px ${sp}px`;

  // Simple single-layer patterns first
  if (type === "dots") {
    return { baseImage: baseDots, baseSize: baseDotsSize, basePosition: basePos };
  }
  if (type === "grid") {
    const lw = theme.gridLineWidth || 1;
    return {
      baseImage: [
        `linear-gradient(to right, ${color} ${lw}px, transparent ${lw}px)`,
        `linear-gradient(to bottom, ${color} ${lw}px, transparent ${lw}px)`,
      ].join(", "),
      baseSize: `${sp}px ${sp}px, ${sp}px ${sp}px`,
      basePosition: `0 0, 0 0`,
    };
  }

  // Dots with accent — multiple distribution modes
  if (type !== "dots-accent-size" && type !== "dots-accent-bright") return null;

  const dist = theme.accentDistribution || "even";

  // Accent dot appearance
  let accentDot;
  if (type === "dots-accent-size") {
    const accentSize = ds * scale;
    accentDot = `radial-gradient(circle, ${color} ${accentSize}px, transparent ${accentSize}px)`;
  } else {
    const brightAlpha = Math.min(1, (theme.dotOpacity / 100) * scale);
    const bright = hexToRgba(theme.dotColor, brightAlpha);
    accentDot = `radial-gradient(circle, ${bright} ${ds * 1.1}px, transparent ${ds * 1.1}px)`;
  }

  // For "even" distribution: also fade the base dots since accent doubles up on every Nth cell
  // Keep faint base for dots-accent-bright
  let baseForAccent = baseDots;
  if (type === "dots-accent-bright") {
    const faintAlpha = Math.max(0.02, (theme.dotOpacity / 100) * 0.4);
    const faint = hexToRgba(theme.dotColor, faintAlpha);
    baseForAccent = `radial-gradient(circle, ${faint} ${ds}px, transparent ${ds}px)`;
  }

  if (dist === "even") {
    // Current 2-layer approach on base: small everywhere, big on every Nth cell
    return {
      baseImage: [accentDot, baseForAccent].join(", "),
      baseSize: `${sp * mult}px ${sp * mult}px, ${sp}px ${sp}px`,
      basePosition: `${basePos}, ${basePos}`,
    };
  }

  // Radial / band — base dots on main bg, accent layer on ::before with mask
  const result = {
    baseImage: baseForAccent,
    baseSize: baseDotsSize,
    basePosition: basePos,
    accentImage: accentDot,
    accentSize: baseDotsSize,       // SAME spacing as base so dots align
    accentPosition: basePos,
  };

  const falloff = Math.max(10, Math.min(200, theme.accentFalloff || 60));
  const px = Math.max(0, Math.min(100, theme.accentPositionX));
  const py = Math.max(0, Math.min(100, theme.accentPositionY));

  if (dist === "radial") {
    // circular hotspot that fades out
    const inner = Math.max(2, falloff * 0.2);
    result.accentMask = `radial-gradient(circle at ${px}% ${py}%, black 0%, black ${inner}%, transparent ${falloff}%)`;
  } else if (dist === "band") {
    // band across the slide at accentAngle
    const angle = Math.max(0, Math.min(180, theme.accentAngle || 0));
    const h = Math.min(48, falloff / 2); // half band width in %
    const s = Math.min(h * 0.6, 18);     // softness
    result.accentMask = `linear-gradient(${angle}deg,
      transparent 0%,
      transparent ${50 - h}%,
      black ${50 - h + s}%,
      black ${50 + h - s}%,
      transparent ${50 + h}%,
      transparent 100%)`;
  }

  return result;
}

/* ============================================================
   RENDER — PREVIEW
   ============================================================ */
function renderPreview() {
  const root = document.getElementById("slides-preview");
  const car = currentCarousel();
  document.getElementById("current-carousel-title").textContent = car.name;

  root.innerHTML = car.slides.map((s, i) => renderSlideStage(s, i)).join("");

  root.querySelectorAll(".dl").forEach((btn) => {
    btn.addEventListener("click", () => exportSlide(parseInt(btn.dataset.idx, 10)));
  });
}

function renderSlideStage(s, i) {
  const total = slidesOf().length;
  const n = String(i + 1).padStart(2, "0");
  const t = String(total).padStart(2, "0");
  return `
    <div class="slide-stage">
      <div class="slide-stage-meta">
        <span>SLIDE ${n} / ${t}</span>
        <span class="dl" data-idx="${i}">⇣ download png</span>
      </div>
      <div class="slide-box" id="slide-box-${i}">${renderSlideInner(s, i)}</div>
    </div>
  `;
}

function renderSlideInner(s, i) {
  const theme = getTheme(s.themeId);
  const handle = esc(state.handle || "");
  const n = String(i + 1).padStart(2, "0");
  const total = String(slidesOf().length).padStart(2, "0");
  const pageMark = `${n} / ${total}`;

  const hasPhoto = !!s.photo;
  // Pattern suppressed when a photo covers the slide (photo replaces pattern)
  const pattern = !hasPhoto && s.type !== "cover" ? patternCSS(theme) : null;
  const styleParts = [
    `--bg-slide:${theme.bgColor}`,
    `--ink-slide:${theme.inkColor}`,
    `--footer-color:${hexToRgba(theme.inkColor, 0.5)}`,
  ];
  if (pattern) {
    styleParts.push(`--pattern-image:${pattern.baseImage}`);
    styleParts.push(`--pattern-size:${pattern.baseSize}`);
    styleParts.push(`--pattern-position:${pattern.basePosition}`);
    if (pattern.accentImage) {
      styleParts.push(`--accent-image:${pattern.accentImage}`);
      styleParts.push(`--accent-size:${pattern.accentSize}`);
      styleParts.push(`--accent-position:${pattern.accentPosition}`);
      styleParts.push(`--accent-mask:${pattern.accentMask || 'linear-gradient(black, black)'}`);
    }
  }
  const styleVars = styleParts.join(";");

  const classList = ["slide-inner"];
  if (pattern) classList.push("has-pattern");
  if (pattern && pattern.accentImage) classList.push("has-accent");
  if (hasPhoto) classList.push("has-photo");
  else if (s.type === "cover") classList.push("no-photo");
  classList.push(s.type);
  if (s.type === "text") classList.push("order-" + (s.order || "ba"));
  classList.push("align-" + (s.alignment || "left"));

  // Photo + texture + dim layers (for ANY slide with a photo)
  let photoLayers = "";
  if (hasPhoto) {
    const filter = s.photoFilter && s.photoFilter !== "none" ? ` filter-${s.photoFilter}` : "";
    photoLayers += `<div class="slide-photo${filter}" style="background-image:url('${s.photo}')"></div>`;

    // Blurred duplicate layer (localized via mask)
    if (s.photoBlur && s.photoBlur !== "none") {
      const amount = s.photoBlurAmount != null ? s.photoBlurAmount : 20;
      let mask = "";
      if (s.photoBlur === "radial") {
        const fx = s.photoBlurPositionX != null ? s.photoBlurPositionX : 50;
        const fy = s.photoBlurPositionY != null ? s.photoBlurPositionY : 50;
        const falloff = s.photoBlurFalloff != null ? s.photoBlurFalloff : 40;
        const inner = Math.max(2, falloff * 0.25);
        mask = `radial-gradient(circle at ${fx}% ${fy}%, black 0%, black ${inner}%, transparent ${falloff}%)`;
      } else if (s.photoBlur === "band") {
        const angle = s.photoBlurAngle != null ? s.photoBlurAngle : 0;
        const half = Math.min(48, (s.photoBlurFalloff != null ? s.photoBlurFalloff : 40) / 2);
        const soft = Math.min(half * 0.6, 18);
        mask = `linear-gradient(${angle}deg, transparent 0%, transparent ${50 - half}%, black ${50 - half + soft}%, black ${50 + half - soft}%, transparent ${50 + half}%, transparent 100%)`;
      }
      // Build a merged CSS filter string so photoFilter (grayscale/etc.) composes with blur
      const baseFilters = {
        grayscale: "grayscale(1) contrast(1.02)",
        sepia: "sepia(0.7) saturate(1.1)",
        dim: "brightness(0.6)",
        faded: "grayscale(0.6) brightness(1.05) contrast(0.95)",
      };
      const preFilter = baseFilters[s.photoFilter] || "";
      const fullFilter = (preFilter + " blur(" + amount + "px)").trim();
      photoLayers += `<div class="slide-photo-blur" style="background-image:url('${s.photo}');filter:${fullFilter};-webkit-mask-image:${mask};mask-image:${mask}"></div>`;
    }

    if (s.photoTexture && s.photoTexture !== "none") {
      const tex = textureDataURL(s.photoTexture);
      if (tex) {
        const opacity = (s.photoTextureOpacity != null ? s.photoTextureOpacity : 60) / 100;
        photoLayers += `<div class="slide-texture" style="background-image:${tex};opacity:${opacity}"></div>`;
      }
    }
    if (s.photoDim && s.photoDim > 0) {
      photoLayers += `<div class="slide-dim" style="opacity:${s.photoDim / 100}"></div>`;
    }
    if (s.type === "cover") photoLayers += `<div class="slide-gradient-bottom"></div>`;
  } else if (s.type === "cover") {
    photoLayers += `<div class="slide-gradient-bottom"></div>`;
  }

  const iconHTML = renderIconHTML(s.icon);

  if (s.type === "cover") {
    return `
      <div class="${classList.join(" ")}" data-slide-id="${s.id}" style="${styleVars}">
        ${photoLayers}
        <div class="slide-mark"></div>
        ${iconHTML}
        <div class="cover-copy">
          <div class="slide-headline" style="font-size:${s.headlineSize || 132}px">${esc(s.headline || "")}</div>
        </div>
        <div class="slide-footer"><span>${handle}</span><span>${pageMark}</span></div>
      </div>`;
  }

  if (s.type === "cta") {
    return `
      <div class="${classList.join(" ")}" data-slide-id="${s.id}" style="${styleVars}">
        ${photoLayers}
        <div class="slide-mark"></div>
        ${iconHTML}
        <div class="slide-soft lead" style="font-size:${s.softSize || 46}px">${esc(s.softLead || "")}</div>
        <div class="slide-headline" style="font-size:${s.headlineSize || 280}px">${esc(s.headline || "")}</div>
        <div class="slide-soft why" style="font-size:${s.softSize || 46}px">${esc(s.softWhy || "")}</div>
        <div class="slide-footer"><span>${handle}</span><span>${pageMark}</span></div>
      </div>`;
  }

  if (s.type === "info") {
    const subtitleEl = s.subtitle
      ? `<div class="slide-subtitle" style="font-size:${s.subtitleSize || 44}px">${esc(s.subtitle)}</div>`
      : "";
    const paragraphs = (s.body || "").split(/\n\s*\n/).map(p => `<p>${esc(p.trim())}</p>`).join("");
    return `
      <div class="${classList.join(" ")}" data-slide-id="${s.id}" style="${styleVars}">
        ${photoLayers}
        <div class="slide-mark"></div>
        ${iconHTML}
        <div class="slide-headline" style="font-size:${s.headlineSize || 92}px">${esc(s.headline || "")}</div>
        ${subtitleEl}
        <div class="slide-body" style="font-size:${s.bodySize || 38}px">${paragraphs}</div>
        <div class="slide-footer"><span>${handle}</span><span>${pageMark}</span></div>
      </div>`;
  }

  if (s.type === "screenshot") {
    const tagEl = s.tag ? `<div class="slide-tag" style="font-size:${s.tagSize || 24}px">${esc(s.tag)}</div>` : "";
    const imageEl = s.image
      ? `<div class="slide-image"><img src="${s.image}" alt=""></div>`
      : `<div class="slide-image-placeholder">drop a screenshot in the sidebar →</div>`;
    const captionEl = s.caption ? `<div class="slide-caption" style="font-size:${s.captionSize || 30}px">${esc(s.caption)}</div>` : "";
    return `
      <div class="${classList.join(" ")}" data-slide-id="${s.id}" style="${styleVars}">
        <div class="slide-mark"></div>
        ${iconHTML}
        ${tagEl}
        <div class="slide-headline" style="font-size:${s.headlineSize || 96}px">${esc(s.headline || "")}</div>
        ${imageEl}
        ${captionEl}
        <div class="slide-footer"><span>${handle}</span><span>${pageMark}</span></div>
      </div>`;
  }

  if (s.type === "prompt") {
    const tagEl = s.tag ? `<div class="slide-tag" style="font-size:${s.tagSize || 24}px">${esc(s.tag)}</div>` : "";
    const captionEl = s.caption ? `<div class="slide-caption" style="font-size:${s.captionSize || 30}px">${esc(s.caption)}</div>` : "";
    return `
      <div class="${classList.join(" ")}" data-slide-id="${s.id}" style="${styleVars}">
        <div class="slide-mark"></div>
        ${iconHTML}
        ${tagEl}
        <div class="slide-headline" style="font-size:${s.headlineSize || 92}px">${esc(s.headline || "")}</div>
        <div class="slide-prompt" style="font-size:${s.promptSize || 30}px">${esc(s.prompt || "")}</div>
        ${captionEl}
        <div class="slide-footer"><span>${handle}</span><span>${pageMark}</span></div>
      </div>`;
  }

  if (s.type === "comparison") {
    const tagEl = s.tag ? `<div class="slide-tag" style="font-size:${s.tagSize || 24}px">${esc(s.tag)}</div>` : "";
    const captionEl = s.caption ? `<div class="slide-caption" style="font-size:${s.captionSize || 30}px">${esc(s.caption)}</div>` : "";
    const cellA = s.imageA
      ? `<div class="slide-compare-item"><img src="${s.imageA}" alt=""></div>`
      : `<div class="slide-compare-item"><div class="slide-compare-placeholder">upload image A</div></div>`;
    const cellB = s.imageB
      ? `<div class="slide-compare-item"><img src="${s.imageB}" alt=""></div>`
      : `<div class="slide-compare-item"><div class="slide-compare-placeholder">upload image B</div></div>`;
    const labelA = s.labelA ? `<div class="slide-compare-label">${esc(s.labelA)}</div>` : "";
    const labelB = s.labelB ? `<div class="slide-compare-label">${esc(s.labelB)}</div>` : "";
    return `
      <div class="${classList.join(" ")}" data-slide-id="${s.id}" style="${styleVars}">
        <div class="slide-mark"></div>
        ${iconHTML}
        ${tagEl}
        <div class="slide-headline" style="font-size:${s.headlineSize || 96}px">${esc(s.headline || "")}</div>
        <div class="slide-compare-grid">
          <div class="slide-compare-cell">${cellA}${labelA}</div>
          <div class="slide-compare-cell">${cellB}${labelB}</div>
        </div>
        ${captionEl}
        <div class="slide-footer"><span>${handle}</span><span>${pageMark}</span></div>
      </div>`;
  }

  if (s.type === "list") {
    const tagEl = s.tag ? `<div class="slide-tag" style="font-size:${s.tagSize || 22}px">${esc(s.tag)}</div>` : "";
    const captionEl = s.caption ? `<div class="slide-caption" style="font-size:${s.captionSize || 30}px">${esc(s.caption)}</div>` : "";
    const itemsArr = (s.items || "").split("\n").map(x => x.trim()).filter(Boolean);
    const itemSize = s.itemSize || 40;
    const numSize = Math.round(itemSize * 1.1);
    const itemsHtml = itemsArr.map((txt, i) =>
      `<li><span class="num" style="font-size:${numSize}px">${i + 1}.</span><span class="text" style="font-size:${itemSize}px">${esc(txt)}</span></li>`
    ).join("");
    return `
      <div class="${classList.join(" ")}" data-slide-id="${s.id}" style="${styleVars}">
        <div class="slide-mark"></div>
        ${iconHTML}
        ${tagEl}
        <div class="slide-headline" style="font-size:${s.headlineSize || 108}px">${esc(s.headline || "")}</div>
        <ul class="slide-list">${itemsHtml}</ul>
        ${captionEl}
        <div class="slide-footer"><span>${handle}</span><span>${pageMark}</span></div>
      </div>`;
  }

  // text
  const softEl = `<div class="slide-soft" style="font-size:${s.softSize || 54}px">${esc(s.soft || "")}</div>`;
  const headlineEl = `<div class="slide-headline" style="font-size:${s.headlineSize || 108}px">${esc(s.headline || "")}</div>`;
  const children = s.order === "ab" ? [softEl, headlineEl] : [headlineEl, softEl];

  return `
    <div class="${classList.join(" ")}" data-slide-id="${s.id}" style="${styleVars}">
      ${photoLayers}
      <div class="slide-mark"></div>
      ${iconHTML}
      ${children.join("")}
      <div class="slide-footer"><span>${handle}</span><span>${pageMark}</span></div>
    </div>`;
}

function renderIconHTML(icon) {
  if (!icon || !icon.image) return "";
  const size = icon.size || 180;
  const offset = icon.offset != null ? icon.offset : 120;
  const pos = icon.position || "top-center";
  let style = `width:${size}px;height:${size}px;background-image:url('${icon.image}');`;
  switch (pos) {
    case "top-left":
      style += `top:${offset}px;left:${offset}px;`; break;
    case "top-center":
      style += `top:${offset}px;left:50%;transform:translateX(-50%);`; break;
    case "top-right":
      style += `top:${offset}px;right:${offset}px;`; break;
    case "middle-left":
      style += `top:50%;left:${offset}px;transform:translateY(-50%);`; break;
    case "center":
      style += `top:50%;left:50%;transform:translate(-50%,-50%);`; break;
    case "middle-right":
      style += `top:50%;right:${offset}px;transform:translateY(-50%);`; break;
    case "bottom-left":
      style += `bottom:${offset}px;left:${offset}px;`; break;
    case "bottom-center":
      style += `bottom:${offset}px;left:50%;transform:translateX(-50%);`; break;
    case "bottom-right":
      style += `bottom:${offset}px;right:${offset}px;`; break;
  }
  return `<div class="slide-icon" style="${style}"></div>`;
}

/* ============================================================
   RENDER — CAROUSEL PICKER
   ============================================================ */
function renderCarouselPicker() {
  const sel = document.getElementById("car-picker");
  sel.innerHTML = Object.values(state.carousels)
    .map(c => `<option value="${c.id}" ${c.id === state.currentCarouselId ? "selected" : ""}>${esc(c.name)} · ${c.slides.length} slides</option>`)
    .join("");
  const car = currentCarousel();
  document.getElementById("car-meta").textContent = `${car.slides.length} slide${car.slides.length === 1 ? "" : "s"}`;
}

/* ============================================================
   RENDER — GLOBAL
   ============================================================ */
function renderGlobalControls() {
  const sel = document.getElementById("g-default-theme");
  sel.innerHTML = Object.values(state.themes)
    .map(t => `<option value="${t.id}" ${t.id === state.defaultThemeId ? "selected" : ""}>${esc(t.name)}</option>`)
    .join("");
  document.getElementById("g-handle").value = state.handle || "";
}

/* ============================================================
   RENDER — THEMES LIST
   ============================================================ */
function renderThemesList() {
  const root = document.getElementById("themes-list");
  const themes = Object.values(state.themes);
  document.getElementById("themes-count").textContent = themes.length + " theme" + (themes.length === 1 ? "" : "s");

  // Remember which theme cards were open so we can restore them after re-render
  const openIds = new Set(
    Array.from(root.querySelectorAll(".card.open")).map(c => c.dataset.themeId)
  );

  root.innerHTML = themes.map(t => themeCardHTML(t)).join("");

  // Restore open state
  openIds.forEach(id => {
    const c = root.querySelector(`.card[data-theme-id="${id}"]`);
    if (c) c.classList.add("open");
  });

  root.querySelectorAll(".card-head").forEach((h) => {
    h.addEventListener("click", (e) => {
      if (e.target.closest(".card-actions")) return;
      h.parentElement.classList.toggle("open");
    });
  });

  root.querySelectorAll("[data-theme-field]").forEach((el) => {
    const evtName = (el.tagName === "SELECT") ? "change" : "input";
    el.addEventListener(evtName, () => {
      const card = el.closest(".card");
      const id = card.dataset.themeId;
      const field = el.dataset.themeField;
      let v = el.value;
      if (el.type === "number" || el.type === "range") v = parseFloat(v);
      if (el.type === "checkbox") v = el.checked;
      state.themes[id][field] = v;
      saveState();

      // If pattern type changed, the conditional fields differ — re-render the whole list
      if (field === "patternType") {
        renderThemesList();
        renderPreview();
        // Re-open this card
        const c = document.querySelector(`[data-theme-id="${id}"]`);
        if (c) c.classList.add("open");
        return;
      }

      const readout = el.parentElement.querySelector(".slider-val");
      if (readout && (el.type === "range" || el.type === "number")) {
        const unit = el.dataset.unit || "";
        readout.textContent = v + unit;
      }
      if (el.type === "color") {
        const mirror = card.querySelector(`[data-theme-hex-for="${field}"]`);
        if (mirror) mirror.value = el.value;
      }
      renderPreview();
      const swatchEl = card.querySelector(".theme-swatch");
      if (swatchEl) swatchEl.style.background = state.themes[id].bgColor;
    });
  });

  // Chip selector for theme fields (e.g. accentDistribution)
  root.querySelectorAll("[data-theme-field-chip]").forEach((el) => {
    el.addEventListener("click", () => {
      const card = el.closest(".card");
      const id = card.dataset.themeId;
      const field = el.dataset.themeFieldChip;
      state.themes[id][field] = el.dataset.themeChip;
      saveState();
      renderThemesList();
      renderPreview();
      const c = document.querySelector(`[data-theme-id="${id}"]`);
      if (c) c.classList.add("open");
    });
  });

  root.querySelectorAll("[data-theme-hex]").forEach((el) => {
    el.addEventListener("input", () => {
      const card = el.closest(".card");
      const id = card.dataset.themeId;
      const field = el.dataset.themeHex;
      const v = sanitizeHex(el.value);
      if (!v) return;
      state.themes[id][field] = v;
      card.querySelector(`[data-theme-field="${field}"]`).value = v;
      saveState();
      renderPreview();
      const swatchEl = card.querySelector(".theme-swatch");
      if (swatchEl) swatchEl.style.background = state.themes[id].bgColor;
    });
  });

  root.querySelectorAll("[data-theme-rename]").forEach((el) => {
    el.addEventListener("click", async (e) => {
      e.stopPropagation();
      const id = el.closest(".card").dataset.themeId;
      const name = await askName("Rename theme", state.themes[id].name);
      if (!name) return;
      state.themes[id].name = name;
      saveState();
      renderThemesList(); renderGlobalControls(); renderSlidesList(); renderCarouselPicker();
    });
  });

  root.querySelectorAll("[data-theme-duplicate]").forEach((el) => {
    el.addEventListener("click", (e) => {
      e.stopPropagation();
      const id = el.closest(".card").dataset.themeId;
      const src = state.themes[id];
      const newId = uid("theme");
      state.themes[newId] = { ...structuredClone(src), id: newId, name: src.name + " (copy)" };
      saveState();
      renderThemesList(); renderGlobalControls(); renderSlidesList();
      toast("✓ Theme duplicated");
    });
  });

  root.querySelectorAll("[data-theme-delete]").forEach((el) => {
    el.addEventListener("click", async (e) => {
      e.stopPropagation();
      const id = el.closest(".card").dataset.themeId;
      if (Object.keys(state.themes).length <= 1) { toast("Can't delete last theme"); return; }
      const ok = await askConfirm(`Delete theme "${state.themes[id].name}"? Slides using it will fall back to the default.`);
      if (!ok) return;
      delete state.themes[id];
      if (state.defaultThemeId === id) state.defaultThemeId = Object.keys(state.themes)[0];
      Object.values(state.carousels).forEach(c => c.slides.forEach(s => { if (s.themeId === id) s.themeId = "__default__"; }));
      saveState();
      renderThemesList(); renderGlobalControls(); renderSlidesList(); renderPreview();
    });
  });
}

function themeCardHTML(t) {
  t = normalizeTheme(t);
  const typeLabel = {
    "none": "plain",
    "dots": "dots",
    "dots-accent-size": "dots + size accent",
    "dots-accent-bright": "dots + intensity accent",
    "grid": "grid",
  }[t.patternType] || "plain";

  const patternOptions = [
    ["none", "None (plain)"],
    ["dots", "Bullet-journal dots"],
    ["dots-accent-size", "Dots + size accent (every Nth dot larger)"],
    ["dots-accent-bright", "Dots + intensity accent (every Nth dot brighter)"],
    ["grid", "Graph grid (ruled notebook)"],
  ].map(([v, label]) => `<option value="${v}" ${t.patternType === v ? "selected" : ""}>${esc(label)}</option>`).join("");

  const showPatternFields = t.patternType !== "none";
  const isDotsVariant = t.patternType?.startsWith("dots");
  const isAccentVariant = t.patternType === "dots-accent-size" || t.patternType === "dots-accent-bright";
  const isGrid = t.patternType === "grid";

  const dotColor = `
    <div class="field">
      <label>${isGrid ? "Line" : "Dot"} color</label>
      <div class="field-row">
        <input type="color" data-theme-field="dotColor" value="${t.dotColor}">
        <input type="text" data-theme-hex="dotColor" data-theme-hex-for="dotColor" value="${t.dotColor}" maxlength="9">
      </div>
    </div>`;
  const opacity = `
    <div class="field">
      <label>${isGrid ? "Line" : "Dot"} opacity <span class="slider-val">${t.dotOpacity}%</span></label>
      <input type="range" data-theme-field="dotOpacity" data-unit="%" min="0" max="100" value="${t.dotOpacity}">
    </div>`;
  const size = isDotsVariant ? `
    <div class="field">
      <label>Dot size <span class="slider-val">${t.dotSize}px</span></label>
      <input type="range" data-theme-field="dotSize" data-unit="px" min="0.5" max="4" step="0.1" value="${t.dotSize}">
    </div>` : "";
  const gridWidth = isGrid ? `
    <div class="field">
      <label>Line width <span class="slider-val">${t.gridLineWidth || 1}px</span></label>
      <input type="range" data-theme-field="gridLineWidth" data-unit="px" min="0.5" max="3" step="0.5" value="${t.gridLineWidth || 1}">
    </div>` : "";
  const spacing = `
    <div class="field">
      <label>${isGrid ? "Cell size" : "Dot spacing"} <span class="slider-val">${t.dotSpacing}px</span></label>
      <input type="range" data-theme-field="dotSpacing" data-unit="px" min="12" max="80" step="1" value="${t.dotSpacing}">
    </div>`;
  const accentScale = isAccentVariant ? `
    <div class="field">
      <label>Accent ${t.patternType === "dots-accent-size" ? "size" : "brightness"} boost <span class="slider-val">${t.accentScale}×</span></label>
      <input type="range" data-theme-field="accentScale" data-unit="×" min="1.2" max="5" step="0.1" value="${t.accentScale}">
    </div>` : "";

  const distribution = t.accentDistribution || "even";
  const accentDistribution = isAccentVariant ? `
    <div class="field">
      <label>Accent distribution</label>
      <div class="chip-group">
        ${[
          ["even", "Even (every Nth)"],
          ["radial", "Radial hotspot"],
          ["band", "Linear band"],
        ].map(([v, label]) =>
          `<span class="chip ${distribution === v ? "active" : ""}" data-theme-field-chip="accentDistribution" data-theme-chip="${v}">${esc(label)}</span>`
        ).join("")}
      </div>
    </div>` : "";

  const accentMult = isAccentVariant && distribution === "even" ? `
    <div class="field">
      <label>Accent every Nth cell <span class="slider-val">${t.accentMultiplier}×</span></label>
      <input type="range" data-theme-field="accentMultiplier" data-unit="×" min="2" max="6" step="1" value="${t.accentMultiplier}">
    </div>` : "";

  const hotspotFields = isAccentVariant && (distribution === "radial" || distribution === "band") ? `
    <div class="field">
      <label>Position X <span class="slider-val">${t.accentPositionX}%</span></label>
      <input type="range" data-theme-field="accentPositionX" data-unit="%" min="0" max="100" step="1" value="${t.accentPositionX}">
    </div>
    <div class="field">
      <label>Position Y <span class="slider-val">${t.accentPositionY}%</span></label>
      <input type="range" data-theme-field="accentPositionY" data-unit="%" min="0" max="100" step="1" value="${t.accentPositionY}">
    </div>
    <div class="field">
      <label>${distribution === "radial" ? "Hotspot size" : "Band width"} <span class="slider-val">${t.accentFalloff}%</span></label>
      <input type="range" data-theme-field="accentFalloff" data-unit="%" min="10" max="200" step="2" value="${t.accentFalloff}">
    </div>
    ${distribution === "band" ? `
      <div class="field">
        <label>Band angle <span class="slider-val">${t.accentAngle}°</span></label>
        <input type="range" data-theme-field="accentAngle" data-unit="°" min="0" max="180" step="1" value="${t.accentAngle}">
      </div>` : ""}
  ` : "";

  const patternBlock = showPatternFields
    ? dotColor + opacity + size + gridWidth + spacing + accentScale + accentDistribution + accentMult + hotspotFields
    : "";

  return `
    <div class="card" data-theme-id="${t.id}">
      <div class="card-head">
        <div style="display:flex;align-items:center;gap:6px">
          <span class="theme-swatch" style="background:${t.bgColor}"></span>
          <div>
            <h3>${esc(t.name)}</h3>
            <div class="sub">${t.bgColor} · ${typeLabel}</div>
          </div>
        </div>
        <div class="card-actions">
          <button class="btn small" data-theme-duplicate title="Duplicate">⧉</button>
          <button class="btn small" data-theme-rename title="Rename">✎</button>
          <button class="btn small danger" data-theme-delete title="Delete">✕</button>
          <span class="chev">▾</span>
        </div>
      </div>
      <div class="card-body">
        <div class="field">
          <label>Background</label>
          <div class="field-row">
            <input type="color" data-theme-field="bgColor" value="${t.bgColor}">
            <input type="text" data-theme-hex="bgColor" data-theme-hex-for="bgColor" value="${t.bgColor}" maxlength="9">
          </div>
        </div>
        <div class="field">
          <label>Text color</label>
          <div class="field-row">
            <input type="color" data-theme-field="inkColor" value="${t.inkColor}">
            <input type="text" data-theme-hex="inkColor" data-theme-hex-for="inkColor" value="${t.inkColor}" maxlength="9">
          </div>
        </div>
        <div class="field">
          <label>Pattern</label>
          <select data-theme-field="patternType">${patternOptions}</select>
        </div>
        ${patternBlock}
      </div>
    </div>
  `;
}

/* ============================================================
   RENDER — SLIDES LIST
   ============================================================ */
function renderSlidesList() {
  const root = document.getElementById("slides-list");
  const slides = slidesOf();
  document.getElementById("slides-count").textContent = slides.length + " slide" + (slides.length === 1 ? "" : "s");

  // Remember which cards were open so we can restore them after re-render
  const openIndices = new Set(
    Array.from(root.querySelectorAll(".card.open")).map(c => parseInt(c.dataset.idx, 10))
  );

  root.innerHTML = slides.map((s, i) => slideCardHTML(s, i)).join("");

  // Restore open state
  openIndices.forEach(idx => {
    const c = root.querySelector(`.card[data-idx="${idx}"]`);
    if (c) c.classList.add("open");
  });

  root.querySelectorAll(".card-head").forEach((h) => {
    h.addEventListener("click", (e) => {
      if (e.target.closest(".card-actions")) return;
      h.parentElement.classList.toggle("open");
    });
  });

  root.querySelectorAll("[data-slide-field]").forEach((el) => {
    const evtName = (el.tagName === "SELECT") ? "change" : "input";
    el.addEventListener(evtName, () => {
      const idx = parseInt(el.closest(".card").dataset.idx, 10);
      const field = el.dataset.slideField;
      let v = el.value;
      if (el.type === "number" || el.type === "range") v = parseFloat(v);
      slidesOf()[idx][field] = v;
      saveState();

      // Re-render slide card when a conditional-UI field changes
      if (field === "photoTexture" || field === "photoBlur") {
        renderSlidesList(); renderPreview();
        const c = document.querySelector(`.card[data-idx="${idx}"]`);
        if (c) c.classList.add("open");
        return;
      }

      renderPreview();
      const readout = el.parentElement.querySelector(".slider-val");
      if (readout && (el.type === "range" || el.type === "number")) {
        readout.textContent = v + (el.dataset.unit || "px");
      }
    });
  });

  root.querySelectorAll("[data-slide-chip]").forEach((el) => {
    el.addEventListener("click", () => {
      const idx = parseInt(el.closest(".card").dataset.idx, 10);
      const field = el.dataset.slideField;
      slidesOf()[idx][field] = el.dataset.slideChip;
      saveState();
      renderSlidesList(); renderPreview();
    });
  });

  root.querySelectorAll("[data-slide-delete]").forEach((el) => {
    el.addEventListener("click", async (e) => {
      e.stopPropagation();
      const idx = parseInt(el.closest(".card").dataset.idx, 10);
      if (slidesOf().length <= 1) { toast("Can't delete last slide"); return; }
      const ok = await askConfirm(`Delete slide ${idx + 1}?`);
      if (!ok) return;
      slidesOf().splice(idx, 1);
      saveState(); renderSlidesList(); renderPreview();
    });
  });

  root.querySelectorAll("[data-slide-up], [data-slide-down]").forEach((el) => {
    el.addEventListener("click", (e) => {
      e.stopPropagation();
      const idx = parseInt(el.closest(".card").dataset.idx, 10);
      const delta = el.dataset.slideUp !== undefined ? -1 : 1;
      const j = idx + delta;
      const sl = slidesOf();
      if (j < 0 || j >= sl.length) return;
      [sl[idx], sl[j]] = [sl[j], sl[idx]];
      saveState(); renderSlidesList(); renderPreview();
    });
  });

  root.querySelectorAll("[data-slide-photo]").forEach((el) => {
    el.addEventListener("change", (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      const idx = parseInt(el.closest(".card").dataset.idx, 10);
      const reader = new FileReader();
      reader.onload = () => {
        slidesOf()[idx].photo = reader.result;
        saveState(); renderSlidesList(); renderPreview();
        toast("Photo loaded");
      };
      reader.readAsDataURL(file);
    });
  });

  root.querySelectorAll("[data-slide-photo-clear]").forEach((el) => {
    el.addEventListener("click", (e) => {
      e.stopPropagation();
      const idx = parseInt(el.closest(".card").dataset.idx, 10);
      slidesOf()[idx].photo = null;
      saveState(); renderSlidesList(); renderPreview();
    });
  });

  // Screenshot / prompt / comparison — image upload handlers
  function wireImageField(selector, fieldName) {
    root.querySelectorAll(selector).forEach((el) => {
      el.addEventListener("change", (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const idx = parseInt(el.closest(".card").dataset.idx, 10);
        const reader = new FileReader();
        reader.onload = () => {
          slidesOf()[idx][fieldName] = reader.result;
          saveState(); renderSlidesList(); renderPreview();
          toast("Image loaded");
        };
        reader.readAsDataURL(file);
      });
    });
  }
  function wireImageClear(selector, fieldName) {
    root.querySelectorAll(selector).forEach((el) => {
      el.addEventListener("click", (e) => {
        e.stopPropagation();
        const idx = parseInt(el.closest(".card").dataset.idx, 10);
        slidesOf()[idx][fieldName] = null;
        saveState(); renderSlidesList(); renderPreview();
      });
    });
  }
  wireImageField("[data-slide-image]", "image");
  wireImageClear("[data-slide-image-clear]", "image");
  wireImageField("[data-slide-image-a]", "imageA");
  wireImageClear("[data-slide-image-a-clear]", "imageA");
  wireImageField("[data-slide-image-b]", "imageB");
  wireImageClear("[data-slide-image-b-clear]", "imageB");

  // Icon upload
  root.querySelectorAll("[data-slide-icon]").forEach((el) => {
    el.addEventListener("change", (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      const idx = parseInt(el.closest(".card").dataset.idx, 10);
      const reader = new FileReader();
      reader.onload = () => {
        const s = slidesOf()[idx];
        s.icon = s.icon || { position: "top-center", size: 180, offset: 120 };
        s.icon.image = reader.result;
        saveState(); renderSlidesList(); renderPreview();
        toast("Icon loaded");
      };
      reader.readAsDataURL(file);
    });
  });
  root.querySelectorAll("[data-slide-icon-clear]").forEach((el) => {
    el.addEventListener("click", (e) => {
      e.stopPropagation();
      const idx = parseInt(el.closest(".card").dataset.idx, 10);
      slidesOf()[idx].icon = null;
      saveState(); renderSlidesList(); renderPreview();
    });
  });
  root.querySelectorAll("[data-icon-field]").forEach((el) => {
    el.addEventListener("input", () => {
      const idx = parseInt(el.closest(".card").dataset.idx, 10);
      const field = el.dataset.iconField;
      let v = el.value;
      if (el.type === "number" || el.type === "range") v = parseFloat(v);
      const s = slidesOf()[idx];
      if (!s.icon) return;
      s.icon[field] = v;
      saveState(); renderPreview();
      const readout = el.parentElement.querySelector(".slider-val");
      if (readout && (el.type === "range" || el.type === "number")) readout.textContent = v + "px";
    });
  });
  root.querySelectorAll("[data-icon-chip]").forEach((el) => {
    el.addEventListener("click", () => {
      const idx = parseInt(el.closest(".card").dataset.idx, 10);
      const s = slidesOf()[idx];
      if (!s.icon) return;
      s.icon.position = el.dataset.iconChip;
      saveState(); renderSlidesList(); renderPreview();
    });
  });
}

function slideCardHTML(s, i) {
  const typeLabel = {
    cover: "Photo cover", text: "Text", cta: "CTA (3-line)", info: "Info (editorial)",
    screenshot: "Screenshot", prompt: "Prompt", comparison: "Comparison", list: "List",
  }[s.type] || s.type;
  const preview = {
    cover: (s.headline || "").split("\n")[0] || "(no text)",
    text: ((s.order === "ab" ? s.soft : s.headline) || "").split("\n")[0] || "(empty)",
    cta: s.headline || "(empty)",
    info: s.headline || "(empty)",
    screenshot: (s.headline || s.tag || "Screenshot").split("\n")[0],
    prompt: (s.headline || s.tag || "Prompt").split("\n")[0],

  const alignChips = `
    <div class="field">

  const themeDropdown = `

  const iconBlock = `
    <div class="field">

        <label>Tag size <span class="slider-val">${s.tagSize || 24}px</span></label>

      </div>
      <div class="field">
        <label>Caption (italic, optional)</label>

      </div>
      <div class="field">
        <label>Tag size <span class="slider-val">${s.tagSize || 24}px</span></label>
        <input type="range" data-slide-field="tagSize" min="14" max="40" step="1" value="${s.tagSize || 24}">
      </div>
      <div class="field">
        <label>Headline size <span class="slider-val">${s.headlineSize || 92}px</span></label>
        <input type="range" data-slide-field="headlineSize" min="40" max="160" step="2" value="${s.headlineSize || 92}">
      </div>
      <div class="field">
        <label>Prompt font size <span class="slider-val">${s.promptSize || 30}px</span></label>
        <input type="range" data-slide-field="promptSize" min="18" max="44" step="1" value="${s.promptSize || 30}">

      <div class="field">

      </div>
      ${themeDropdown}
      ${alignChips}
      ${iconBlock}
    `;
  } else if (s.type === "comparison") {
    body = `
      <div class="field">
        <label>Tag (small caps, optional)</label>
        <input type="text" data-slide-field="tag" value="${esc(s.tag || "")}" placeholder="BEFORE / AFTER">
      </div>
      <div class="field">
        <label>Headline (Inter Black)</label>
        <textarea data-slide-field="headline">${esc(s.headline || "")}</textarea>
      </div>
      <div class="field">
        <label>Image A (left)</label>
        <input type="file" data-slide-image-a accept="image/*">
        ${s.imageA ? `<div style="margin-top:8px"><button class="btn small danger" data-slide-image-a-clear>Remove image A</button></div>` : ""}
        <input type="text" data-slide-field="labelA" value="${esc(s.labelA || "")}" placeholder="BEFORE" style="margin-top:8px">
      </div>
      <div class="field">
        <label>Image B (right)</label>
        <input type="file" data-slide-image-b accept="image/*">
        ${s.imageB ? `<div style="margin-top:8px"><button class="btn small danger" data-slide-image-b-clear>Remove image B</button></div>` : ""}
        <input type="text" data-slide-field="labelB" value="${esc(s.labelB || "")}" placeholder="AFTER" style="margin-top:8px">
      </div>
      <div class="field">
        <label>Caption (italic, optional)</label>
        <textarea data-slide-field="caption">${esc(s.caption || "")}</textarea>
      </div>
      <div class="field">
        <label>Tag size <span class="slider-val">${s.tagSize || 24}px</span></label>
        <input type="range" data-slide-field="tagSize" min="14" max="40" step="1" value="${s.tagSize || 24}">
      </div>
      <div class="field">
        <label>Headline size <span class="slider-val">${s.headlineSize || 96}px</span></label>
        <input type="range" data-slide-field="headlineSize" min="40" max="180" step="2" value="${s.headlineSize || 96}">
      </div>
      <div class="field">
        <label>Caption size <span class="slider-val">${s.captionSize || 30}px</span></label>
        <input type="range" data-slide-field="captionSize" min="18" max="48" step="1" value="${s.captionSize || 30}">
      </div>
      ${themeDropdown}
      ${alignChips}
      ${iconBlock}
    `;
  } else if (s.type === "list") {
    body = `
      <div class="field">
        <label>Tag (small caps, optional)</label>
        <input type="text" data-slide-field="tag" value="${esc(s.tag || "")}" placeholder="LESSONS">
      </div>
      <div class="field">
        <label>Headline (Inter Black)</label>
        <textarea data-slide-field="headline">${esc(s.headline || "")}</textarea>
      </div>
      <div class="field">
        <label>Items — one per line (numbered automatically)</label>
        <textarea data-slide-field="items" style="min-height:120px">${esc(s.items || "")}</textarea>
        <div class="hint">Keep each line short — ideally under 60 chars.</div>
      </div>
      <div class="field">
        <label>Caption (italic, optional)</label>
        <textarea data-slide-field="caption">${esc(s.caption || "")}</textarea>
      </div>
      <div class="field">
        <label>Tag size <span class="slider-val">${s.tagSize || 22}px</span></label>
        <input type="range" data-slide-field="tagSize" min="14" max="40" step="1" value="${s.tagSize || 22}">
      </div>
      <div class="field">
        <label>Headline size <span class="slider-val">${s.headlineSize || 108}px</span></label>
        <input type="range" data-slide-field="headlineSize" min="40" max="180" step="2" value="${s.headlineSize || 108}">
      </div>

      <div class="field">
        <label>Caption size <span class="slider-val">${s.captionSize || 30}px</span></label>
