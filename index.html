    `;
  } else {
    body = `
      <div class="field">
        <label>Order</label>
        <div class="chip-group">
          <span class="chip ${s.order === "ab" ? "active" : ""}" data-slide-field="order" data-slide-chip="ab">Italic on top</span>
          <span class="chip ${s.order === "ba" ? "active" : ""}" data-slide-field="order" data-slide-chip="ba">Italic on bottom</span>
        </div>
      </div>
      <div class="field">
        <label>Italic line (Apple Garamond)</label>
        <textarea data-slide-field="soft">${esc(s.soft || "")}</textarea>
      </div>
      <div class="field">
        <label>Headline (Inter Black)</label>
        <textarea data-slide-field="headline">${esc(s.headline || "")}</textarea>
      </div>
      <div class="field">
        <label>Headline size <span class="slider-val">${s.headlineSize || 108}px</span></label>
        <input type="range" data-slide-field="headlineSize" min="40" max="260" step="2" value="${s.headlineSize || 108}">
      </div>
      <div class="field">
        <label>Italic size <span class="slider-val">${s.softSize || 54}px</span></label>
        <input type="range" data-slide-field="softSize" min="20" max="120" step="1" value="${s.softSize || 54}">
      </div>
      ${themeDropdown}
      ${alignChips}
      ${photoBlock}
      ${iconBlock}
    `;
  }

  return `
    <div class="card" data-idx="${i}">
      <div class="card-head">
        <div>
          <h3>Slide ${i + 1} · ${typeLabel}</h3>
          <div class="sub">${esc(preview.substring(0, 44))}${preview.length > 44 ? "…" : ""}</div>
        </div>
        <div class="card-actions">
          <button class="btn small" data-slide-up title="Move up">↑</button>
          <button class="btn small" data-slide-down title="Move down">↓</button>
          <button class="btn small danger" data-slide-delete title="Delete">✕</button>
          <span class="chev">▾</span>
        </div>
      </div>
      <div class="card-body">${body}</div>
    </div>
  `;
}

/* ============================================================
   CAROUSEL ACTIONS
   ============================================================ */
document.getElementById("car-picker").addEventListener("change", (e) => {
  state.currentCarouselId = e.target.value;
  saveState(); renderAll();
});
document.getElementById("car-new").addEventListener("click", async () => {
  const name = await askName("Name this new carousel", "Untitled carousel");
  if (!name) return;
  const id = uid("car");
  state.carousels[id] = {
    id, name,
    slides: [
      { id: uid("s"), type: "cover", themeId: "__default__", alignment: "left", photo: null, headline: "Hook line\ngoes here.", headlineSize: 132, icon: null },
    ]
  };
  state.currentCarouselId = id;
  saveState(); renderAll();
  toast("✓ Carousel created");
});
document.getElementById("car-dup").addEventListener("click", () => {
  const src = currentCarousel();
  const id = uid("car");
  state.carousels[id] = { ...structuredClone(src), id, name: src.name + " (copy)" };
  state.carousels[id].slides.forEach(s => s.id = uid("s"));
  state.currentCarouselId = id;
  saveState(); renderAll();
  toast("✓ Carousel duplicated");
});
document.getElementById("car-rename").addEventListener("click", async () => {
  const car = currentCarousel();
  const name = await askName("Rename carousel", car.name);
  if (!name) return;
  car.name = name;
  saveState(); renderCarouselPicker(); renderPreview();
});
document.getElementById("car-delete").addEventListener("click", async () => {
  if (Object.keys(state.carousels).length <= 1) { toast("Can't delete last carousel"); return; }
  const car = currentCarousel();
  const ok = await askConfirm(`Delete "${car.name}"? This can't be undone.`);
  if (!ok) return;
  delete state.carousels[car.id];
  state.currentCarouselId = Object.keys(state.carousels)[0];
  saveState(); renderAll();
});

/* ============================================================
   THEME ACTIONS (new button)
   ============================================================ */
document.getElementById("theme-new").addEventListener("click", async () => {
  const name = await askName("Name this new theme", "Untitled theme");
  if (!name) return;
  const id = uid("theme");
  state.themes[id] = {
    id, name,
    bgColor: "#f2ede3", inkColor: "#111111",
    patternType: "dots", dotColor: "#5c4820",
    dotOpacity: 22, dotSize: 1.6, dotSpacing: 28,
    accentMultiplier: 3, accentScale: 2.6, gridLineWidth: 1,
  };
  saveState(); renderThemesList(); renderGlobalControls(); renderSlidesList();
  toast("✓ Theme created");
});

/* ============================================================
   GLOBAL (default theme + handle)
   ============================================================ */
document.getElementById("g-default-theme").addEventListener("change", (e) => {
  state.defaultThemeId = e.target.value;
  saveState(); renderPreview();
});
document.getElementById("g-handle").addEventListener("input", (e) => {
  state.handle = e.target.value;
  saveState(); renderPreview();
});

/* ============================================================
   ADD SLIDE
   ============================================================ */
function addSlide(type) {
  const id = uid("s");
  const base = { id, type, themeId: "__default__", alignment: "left", icon: null };
  let slide;
  if (type === "cover") slide = { ...base, photo: null, headline: "New cover headline", headlineSize: 132 };
  else if (type === "cta") slide = { ...base, alignment: "center", softLead: "Lead line —", headline: "CTA.", softWhy: "Why to stay.", softSize: 46, headlineSize: 280 };
  else if (type === "info") slide = {
    ...base,
    headline: "TOOL NAME",
    subtitle: "Short italic intro.",
    body: "First paragraph goes here — explain what it is.\n\nSecond paragraph — explain how you use it.\n\nThird paragraph — a tip, a warning, or a recommendation.",
    headlineSize: 92, subtitleSize: 44, bodySize: 38,
  };
  else if (type === "screenshot") slide = {
    ...base,
    tag: "STEP 1",
    headline: "Your headline\ngoes here.",
    image: null,
    caption: "Short explanation in italic.",
    tagSize: 24, headlineSize: 96, captionSize: 30,
  };
  else if (type === "prompt") slide = {
    ...base,
    tag: "STEP 2",
    headline: "The prompt I pasted.",
    prompt: "Build me a thing that does X.\n\nConstraints:\n- Use Y\n- Avoid Z\n\nGo.",
    caption: "I walked away. Came back to a working thing.",
    tagSize: 24, headlineSize: 92, promptSize: 30, captionSize: 30,
  };
  else if (type === "comparison") slide = {
    ...base,
    tag: "SAME MESSAGE",
    headline: "Different system.",
    imageA: null, imageB: null,
    labelA: "BEFORE", labelB: "AFTER",
    caption: "Same minutes of typing. Different result.",
    tagSize: 24, headlineSize: 96, captionSize: 30,
  };
  else if (type === "list") slide = {
    ...base,
    tag: "",
    headline: "5 things\nI learned.",
    items: "Short lesson one.\nShort lesson two.\nShort lesson three.\nShort lesson four.\nShort lesson five.",
    caption: "",
    tagSize: 22, headlineSize: 108, itemSize: 40, captionSize: 30,
  };
  else slide = { ...base, order: "ba", soft: "Italic line.", headline: "Your headline.", softSize: 54, headlineSize: 108 };
  currentCarousel().slides.push(slide);
  saveState(); renderSlidesList(); renderPreview(); renderCarouselPicker();
}
document.querySelectorAll("[data-add]").forEach((el) => {
  el.addEventListener("click", () => addSlide(el.dataset.add));
});

/* ============================================================
   EXPORT
   ============================================================ */
async function exportSlide(i) {
  const stage = document.getElementById("slide-box-" + i);
  const inner = stage?.querySelector(".slide-inner");
  if (!inner) return;
  toast("Rendering PNG…");
  await document.fonts.ready;

  const clone = inner.cloneNode(true);
  clone.style.transform = "none";
  clone.style.position = "fixed";
  clone.style.top = "-20000px";
  clone.style.left = "0";
  clone.style.width = "1080px";
  clone.style.height = "1350px";
  document.body.appendChild(clone);
  try {
    const canvas = await html2canvas(clone, { width: 1080, height: 1350, scale: 1, backgroundColor: null, useCORS: true, logging: false });
    const car = currentCarousel();
    const safeName = car.name.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
    const link = document.createElement("a");
    link.download = `${safeName}-slide-${String(i + 1).padStart(2, "0")}.png`;
    link.href = canvas.toDataURL("image/png");
    link.click();
    toast("✓ Slide " + (i + 1) + " downloaded");
  } catch (err) {
    console.error(err);
    toast("✕ Export failed: " + err.message, 3000);
  } finally {
    document.body.removeChild(clone);
  }
}

async function exportAll() {
  const n = currentCarousel().slides.length;
  for (let i = 0; i < n; i++) {
    await exportSlide(i);
    await new Promise(r => setTimeout(r, 350));
  }
  toast("✓ All slides downloaded");
}
document.getElementById("export-all").addEventListener("click", exportAll);

/* ============================================================
   SAVE / LOAD / RESET
   ============================================================ */
function saveJSON() {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], { type: "application/json" });
  const link = document.createElement("a");
  link.download = "carousel-library.json";
  link.href = URL.createObjectURL(blob);
  link.click();
  URL.revokeObjectURL(link.href);
  toast("✓ Library saved");
}
document.getElementById("save-json").addEventListener("click", saveJSON);

document.getElementById("load-json").addEventListener("click", () => document.getElementById("load-json-file").click());
document.getElementById("load-json-file").addEventListener("change", (e) => {
  const file = e.target.files?.[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(reader.result);
      if (parsed.version === 1) { state = migrateV1(parsed); toast("✓ Imported + migrated from v1"); }
      else if (parsed.version === 2) { state = parsed; toast("✓ Library imported"); }
      else throw new Error("Unknown version");
      saveState(); renderAll();
    } catch (err) { toast("✕ Invalid JSON: " + err.message, 3000); }
  };
  reader.readAsText(file);
  e.target.value = "";
});

document.getElementById("reset").addEventListener("click", async () => {
  const ok = await askConfirm("Reset everything to defaults? This wipes your entire library of carousels and themes.", "Reset everything");
  if (!ok) return;
  state = freshState();
  saveState(); renderAll();
  toast("✓ Reset to defaults");
});

/* ============================================================
   RENDER ALL + INIT
   ============================================================ */
function renderAll() {
  renderCarouselPicker();
  renderGlobalControls();
  renderThemesList();
  renderSlidesList();
  renderPreview();
}
renderAll();
</script>
