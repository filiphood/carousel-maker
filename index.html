<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Carousel Maker · v2</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --panel-bg: #161616;
    --panel-2: #1f1f1f;
    --panel-3: #262626;
    --panel-line: #2c2c2c;
    --accent: #f4d784;
    --accent-2: #a88cf4;
    --ink: #e9e9e9;
    --ink-soft: #9a9a9a;
    --ink-dim: #6c6c6c;
    --danger: #e26c6c;
  }

  html, body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--panel-bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    height: 100%;
    overflow: hidden;
  }

  .app { display: grid; grid-template-columns: 440px 1fr; height: 100vh; }

  .controls { overflow-y: auto; background: var(--panel-bg); border-right: 1px solid var(--panel-line); }
  .controls::-webkit-scrollbar { width: 10px; }
  .controls::-webkit-scrollbar-thumb { background: #333; border-radius: 5px; }

  .app-header {
    padding: 20px 24px 14px;
    border-bottom: 1px solid var(--panel-line);
    position: sticky;
    top: 0;
    background: var(--panel-bg);
    z-index: 20;
  }
  .app-header h1 { font-size: 15px; font-weight: 900; letter-spacing: 0.08em; text-transform: uppercase; }
  .app-header p { font-size: 11px; color: var(--ink-dim); margin-top: 4px; letter-spacing: 0.02em; }

  /* Carousel switcher bar */
  .car-bar { padding: 14px 24px; border-bottom: 1px solid var(--panel-line); background: #1b1b1b; }
  .car-row { display: flex; gap: 6px; align-items: center; }
  .car-row select { flex: 1; }
  .car-meta { font-size: 10px; color: var(--ink-dim); margin-top: 8px; letter-spacing: 0.02em; }

  .section { padding: 18px 24px; border-bottom: 1px solid var(--panel-line); }
  .section-title {
    font-size: 11px; font-weight: 900; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--ink-soft);
    margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between;
  }
  .section-title .dim { font-weight: 400; color: var(--ink-dim); letter-spacing: 0.02em; text-transform: none; font-size: 11px; }

  .field { margin-bottom: 12px; }
  .field:last-child { margin-bottom: 0; }
  .field label {
    display: block; font-size: 11px; color: var(--ink-soft);
    margin-bottom: 6px; letter-spacing: 0.02em;
  }
  .field-row { display: flex; gap: 10px; align-items: center; }
  .field-row > * { flex: 1; }
  .field-row .shrink { flex: 0 0 auto; }

  input[type="text"], input[type="number"], textarea, select {
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--panel-line);
    color: var(--ink);
    padding: 8px 10px;
    font-size: 13px;
    font-family: inherit;
    border-radius: 6px;
    outline: none;
    transition: border-color .12s;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  textarea { min-height: 60px; resize: vertical; line-height: 1.4; }
  input[type="range"] { width: 100%; accent-color: var(--accent); }
  input[type="color"] {
    width: 42px; height: 32px; border: 1px solid var(--panel-line);
    border-radius: 6px; background: var(--panel-2); cursor: pointer; padding: 2px;
  }
  input[type="checkbox"] { accent-color: var(--accent); width: 16px; height: 16px; }
  input[type="file"] { width: 100%; font-size: 12px; color: var(--ink-soft); }
  input[type="file"]::file-selector-button {
    background: var(--panel-3); border: 1px solid var(--panel-line); color: var(--ink);
    padding: 6px 10px; border-radius: 5px; cursor: pointer;
    font-family: inherit; font-size: 12px; margin-right: 8px;
  }

  .btn {
    background: var(--panel-3); border: 1px solid var(--panel-line); color: var(--ink);
    padding: 8px 14px; border-radius: 6px; cursor: pointer;
    font-family: inherit; font-size: 12px; font-weight: 600; letter-spacing: 0.02em;
    transition: background .12s, border-color .12s;
  }
  .btn:hover { background: #303030; border-color: #3a3a3a; }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #1a1a1a; }
  .btn.primary:hover { background: #f0c968; border-color: #f0c968; }
  .btn.secondary { background: var(--accent-2); border-color: var(--accent-2); color: #1a1a1a; }
  .btn.secondary:hover { background: #9175e8; border-color: #9175e8; }
  .btn.danger { color: var(--danger); }
  .btn.danger:hover { background: #3a1f1f; border-color: #5a2828; }
  .btn.small { padding: 4px 8px; font-size: 11px; }
  .btn.full { width: 100%; }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

  /* Cards (slides + themes) */
  .card {
    background: var(--panel-2); border: 1px solid var(--panel-line); border-radius: 8px;
    margin-bottom: 10px; overflow: hidden;
  }
  .card-head {
    padding: 10px 12px; background: var(--panel-3); cursor: pointer; user-select: none;
    display: flex; justify-content: space-between; align-items: center; gap: 8px;
  }
  .card-head h3 { font-size: 12px; font-weight: 900; letter-spacing: 0.05em; }
  .card-head .sub { font-size: 10px; color: var(--ink-dim); font-weight: 400; letter-spacing: 0.02em; margin-top: 2px; }
  .card-body { padding: 14px 12px; display: none; }
  .card.open .card-body { display: block; }
  .card.open .chev { transform: rotate(180deg); }
  .chev { font-size: 10px; color: var(--ink-dim); transition: transform .12s; }
  .card-actions { display: flex; gap: 4px; align-items: center; }

  .slider-val {
    font-variant-numeric: tabular-nums; color: var(--ink-soft);
    font-size: 11px; min-width: 34px; text-align: right;
  }

  .chip-group { display: flex; gap: 4px; flex-wrap: wrap; }
  .chip {
    background: var(--panel-3); border: 1px solid var(--panel-line); color: var(--ink-soft);
    padding: 5px 9px; border-radius: 5px; font-size: 11px; cursor: pointer; transition: all .12s;
  }
  .chip:hover { color: var(--ink); border-color: #3a3a3a; }
  .chip.active { background: var(--accent); color: #1a1a1a; border-color: var(--accent); font-weight: 600; }

  .theme-swatch {
    width: 18px; height: 18px; border-radius: 4px; border: 1px solid #00000022;
    display: inline-block; vertical-align: middle; margin-right: 6px;
  }

  /* Preview pane */
  .preview {
    overflow-y: auto; background: #0f0f0f;
    padding: 40px 24px 96px;
    display: flex; flex-direction: column; align-items: center; gap: 48px;
  }
  .preview::-webkit-scrollbar { width: 10px; }
  .preview::-webkit-scrollbar-thumb { background: #333; border-radius: 5px; }

  .preview-note {
    color: var(--ink-dim); font-size: 12px; letter-spacing: 0.02em;
    text-align: center; max-width: 640px; line-height: 1.6;
  }
  .preview-title {
    color: var(--ink); font-size: 15px; font-weight: 900; letter-spacing: 0.06em;
    text-transform: uppercase; margin-top: 8px;
  }

  .slide-stage { position: relative; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .slide-stage-meta {
    font-size: 11px; color: var(--ink-dim); letter-spacing: 0.1em;
    text-transform: uppercase; display: flex; gap: 16px; align-items: center;
  }
  .slide-stage-meta .dl {
    color: var(--accent); cursor: pointer; user-select: none;
    letter-spacing: 0.05em; text-transform: none; font-weight: 600;
  }
  .slide-stage-meta .dl:hover { text-decoration: underline; }

  .slide-box {
    width: 540px; height: 675px;
    position: relative; box-shadow: 0 20px 60px rgba(0,0,0,0.5); overflow: hidden;
  }
  .slide-box > .slide-inner {
    width: 1080px; height: 1350px;
    transform: scale(0.5); transform-origin: top left;
    position: absolute; top: 0; left: 0;
  }

  /* Slide content styles */
  .slide-inner {
    font-family: 'Inter', sans-serif;
    color: var(--ink-slide, #111);
    background-color: var(--bg-slide, #f2ede3);
    position: relative;
    padding: 140px 120px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .slide-inner.dots {
    background-image: radial-gradient(circle, var(--dot-color, rgba(92, 72, 30, 0.22)) var(--dot-size, 1.6px), transparent var(--dot-size, 1.6px));
    background-size: var(--dot-spacing, 28px) var(--dot-spacing, 28px);
    background-position: 14px 14px;
  }

  .slide-inner.align-left { text-align: left; align-items: flex-start; }
  .slide-inner.align-center { text-align: center; align-items: center; }
  .slide-inner.align-right { text-align: right; align-items: flex-end; }

  .slide-headline {
    font-family: 'Inter', sans-serif; font-weight: 900;
    line-height: 0.98; letter-spacing: -0.045em; color: inherit;
    white-space: pre-wrap;
  }
  .slide-soft {
    font-family: 'Apple Garamond', 'ITC Garamond Std', 'Garamond', 'Hoefler Text', 'Times New Roman', serif;
    font-style: italic; line-height: 1.18; letter-spacing: -0.005em;
    color: inherit; white-space: pre-wrap;
  }

  .slide-inner.cta .slide-headline { line-height: 0.9; letter-spacing: -0.06em; }
  .slide-inner.cta .slide-soft.lead { margin-bottom: 56px; }
  .slide-inner.cta .slide-soft.why { margin-top: 56px; }

  .slide-inner.order-ab .slide-soft { margin-bottom: 40px; }
  .slide-inner.order-ba .slide-soft { margin-top: 40px; }

  .slide-inner.cover {
    padding: 0; background-color: #1a1a1a;
    background-image:
      linear-gradient(180deg, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.0) 35%, rgba(0,0,0,0.0) 55%, rgba(0,0,0,0.85) 100%),
      var(--bg-photo, radial-gradient(120% 80% at 50% 40%, #4a463f 0%, #2b2823 45%, #0e0d0b 100%));
    background-size: cover, cover; background-position: center, center;
  }
  .slide-inner.cover .cover-copy {
    position: absolute; left: 120px; right: 120px; bottom: 180px;
  }
  .slide-inner.cover .slide-headline, .slide-inner.cover .slide-soft { color: #f6f3ec; }

  .slide-footer {
    position: absolute; left: 120px; right: 120px; bottom: 80px;
    display: flex; justify-content: space-between; align-items: center;
    font-family: 'Inter', sans-serif; font-weight: 900; font-size: 18px;
    letter-spacing: 0.18em; color: var(--footer-color, #6b6b6b); text-transform: uppercase;
  }
  .slide-inner.cover .slide-footer { color: rgba(246,243,236,0.7); }

  .slide-mark {
    position: absolute; top: 80px; left: 120px;
    width: 28px; height: 28px; border: 3px solid currentColor;
    border-radius: 50%; color: var(--ink-slide, #111);
  }
  .slide-inner.cover .slide-mark { color: #f6f3ec; }

  /* Slide icon (decoration image) */
  .slide-icon {
    position: absolute;
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    pointer-events: none;
  }

  .hint { font-size: 10px; color: var(--ink-dim); margin-top: 4px; font-style: italic; }

  .action-bar {
    position: sticky; bottom: 0; background: var(--panel-bg);
    border-top: 1px solid var(--panel-line);
    padding: 14px 24px; display: flex; flex-direction: column; gap: 8px; z-index: 10;
  }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #1d1d1d; border: 1px solid var(--panel-line); color: var(--ink);
    padding: 12px 20px; border-radius: 8px; font-size: 13px; z-index: 100;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-6px); }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.55);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; backdrop-filter: blur(4px);
  }
  .modal {
    background: var(--panel-2); border: 1px solid var(--panel-line);
    border-radius: 10px; padding: 20px 22px; width: 380px; max-width: 90vw;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
  }
  .modal h3 { font-size: 14px; font-weight: 900; margin-bottom: 12px; letter-spacing: 0.02em; }
  .modal p { font-size: 13px; color: var(--ink-soft); line-height: 1.5; margin-bottom: 14px; }
  .modal-input {
    width: 100%; background: var(--panel-3); border: 1px solid var(--panel-line);
    color: var(--ink); padding: 10px 12px; font-size: 14px; font-family: inherit;
    border-radius: 6px; outline: none; margin-bottom: 14px;
  }
  .modal-input:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

  /* ———————————————————— "info" slide type ———————————————————— */
  .slide-inner.info {
    padding: 160px 140px;
    align-items: flex-start;
    justify-content: flex-start;
  }
  .slide-inner.info .slide-headline {
    font-size: 92px;
    line-height: 1.0;
    letter-spacing: -0.04em;
    margin-bottom: 60px;
  }
  .slide-inner.info .slide-subtitle {
    font-family: 'Apple Garamond', 'ITC Garamond Std', 'Garamond', 'Hoefler Text', 'Times New Roman', serif;
    font-style: italic;
    font-size: 44px;
    line-height: 1.25;
    margin-top: -36px;
    margin-bottom: 60px;
    color: inherit;
    opacity: 0.82;
  }
  .slide-inner.info .slide-body {
    font-family: 'Apple Garamond', 'ITC Garamond Std', 'Garamond', 'Hoefler Text', 'Times New Roman', serif;
    font-style: normal;
    font-weight: 400;
    font-size: 38px;
    line-height: 1.42;
    letter-spacing: -0.003em;
    color: inherit;
    max-width: 780px;
  }
  .slide-inner.info .slide-body p + p { margin-top: 28px; }

  .theme-preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 6px; margin-bottom: 10px; }
  .theme-preview-chip {
    height: 44px; border-radius: 6px; position: relative;
    cursor: pointer; border: 2px solid transparent; overflow: hidden;
    transition: border-color .12s;
  }
  .theme-preview-chip.active { border-color: var(--accent); }
  .theme-preview-chip span {
    position: absolute; bottom: 3px; left: 0; right: 0; text-align: center;
    font-size: 9px; font-weight: 900; letter-spacing: 0.05em; text-transform: uppercase;
    color: var(--tpc-ink, #111); text-shadow: 0 0 4px var(--tpc-bg, #fff);
  }
</style>
</head>

<body>

<main class="app">

  <aside class="controls">
    <header class="app-header">
      <h1>Carousel Maker</h1>
      <p>Instagram 1080 × 1350 · auto-saves locally · v2</p>
    </header>

    <!-- Carousel switcher -->
    <div class="car-bar">
      <div class="section-title" style="margin-bottom:10px">Carousel <span class="dim" id="car-meta">—</span></div>
      <div class="car-row">
        <select id="car-picker"></select>
        <button class="btn small" id="car-new" title="New carousel">+</button>
        <button class="btn small" id="car-dup" title="Duplicate">⧉</button>
        <button class="btn small" id="car-rename" title="Rename">✎</button>
        <button class="btn small danger" id="car-delete" title="Delete">✕</button>
      </div>
    </div>

    <!-- Global (handle + default theme) -->
    <div class="section" id="global-section">
      <div class="section-title">Global</div>
      <div class="field">
        <label>Default theme (used when a slide inherits)</label>
        <select id="g-default-theme"></select>
      </div>
      <div class="field">
        <label>Handle (footer left)</label>
        <input type="text" id="g-handle" placeholder="@yourhandle">
      </div>
    </div>

    <!-- Themes library -->
    <div class="section" id="themes-section">
      <div class="section-title">Themes <span class="dim" id="themes-count">—</span></div>
      <div id="themes-list"></div>
      <div class="btn-row" style="margin-top:8px">
        <button class="btn small" id="theme-new">+ New theme</button>
      </div>
    </div>

    <!-- Slides -->
    <div class="section" id="slides-section">
      <div class="section-title">Slides <span class="dim" id="slides-count">—</span></div>
      <div id="slides-list"></div>
      <div class="btn-row" style="margin-top:8px">
        <button class="btn small" data-add="cover">+ Cover (photo)</button>
        <button class="btn small" data-add="text">+ Text</button>
        <button class="btn small" data-add="cta">+ CTA (3-line)</button>
        <button class="btn small" data-add="info">+ Info (editorial)</button>
      </div>
    </div>

    <!-- Actions -->
    <div class="action-bar">
      <div class="btn-row">
        <button class="btn primary" id="export-all" style="flex:1">⇣ Download all PNGs</button>
      </div>
      <div class="btn-row">
        <button class="btn small" id="save-json" style="flex:1">Export file</button>
        <button class="btn small" id="load-json" style="flex:1">Import file</button>
        <button class="btn small danger" id="reset" title="Reset everything">↺</button>
      </div>
      <input type="file" id="load-json-file" accept="application/json" style="display:none">
    </div>
  </aside>

  <section class="preview" id="preview">
    <p class="preview-note">
      Preview at 50% · each slide exports at full 1080 × 1350 via html2canvas.<br>
      Switch carousels or mix themes per slide. Upload tool icons on any slide.
    </p>
    <div class="preview-title" id="current-carousel-title">—</div>
    <div id="slides-preview"></div>
  </section>

</main>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   HELPERS
   ============================================================ */
function hexToRgba(hex, alpha = 1) {
  const h = (hex || "#000").replace("#", "");
  const n = h.length === 3 ? h.split("").map(c => c + c).join("") : h;
  const r = parseInt(n.substring(0, 2), 16) || 0;
  const g = parseInt(n.substring(2, 4), 16) || 0;
  const b = parseInt(n.substring(4, 6), 16) || 0;
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}
function sanitizeHex(v) {
  if (!v) return null;
  if (!v.startsWith("#")) v = "#" + v;
  const m = v.match(/^#[0-9a-f]{3}$|^#[0-9a-f]{6}$/i);
  return m ? v : null;
}
function esc(s) { return (s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
function uid(prefix = "id") { return prefix + "-" + Date.now() + "-" + Math.floor(Math.random() * 9999); }
function toast(msg, ms = 1500) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove("show"), ms);
}

// Inline modal replacement for native prompt() — works consistently in all browsers
function askName(title, defaultValue = "", placeholder = "") {
  return new Promise((resolve) => {
    if (document.querySelector(".modal-overlay")) return resolve(null);
    const overlay = document.createElement("div");
    overlay.className = "modal-overlay";
    overlay.innerHTML = `
      <div class="modal">
        <h3>${esc(title)}</h3>
        <input type="text" class="modal-input" value="${esc(defaultValue)}" placeholder="${esc(placeholder)}">
        <div class="modal-actions">
          <button class="btn small" data-act="cancel">Cancel</button>
          <button class="btn small primary" data-act="ok">OK</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    const input = overlay.querySelector(".modal-input");
    input.focus(); input.select();
    const close = (v) => { overlay.remove(); resolve(v); };
    overlay.addEventListener("click", (e) => { if (e.target === overlay) close(null); });
    overlay.querySelector('[data-act="cancel"]').addEventListener("click", () => close(null));
    overlay.querySelector('[data-act="ok"]').addEventListener("click", () => close(input.value.trim() || null));
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); close(input.value.trim() || null); }
      if (e.key === "Escape") close(null);
    });
  });
}

// Modal confirm (for delete actions — more reliable than native confirm in some browsers)
function askConfirm(msg, confirmLabel = "Delete", danger = true) {
  return new Promise((resolve) => {
    if (document.querySelector(".modal-overlay")) return resolve(false);
    const overlay = document.createElement("div");
    overlay.className = "modal-overlay";
    overlay.innerHTML = `
      <div class="modal">
        <p>${esc(msg)}</p>
        <div class="modal-actions">
          <button class="btn small" data-act="cancel">Cancel</button>
          <button class="btn small ${danger ? "danger" : "primary"}" data-act="ok">${esc(confirmLabel)}</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    const close = (v) => { overlay.remove(); resolve(v); };
    overlay.addEventListener("click", (e) => { if (e.target === overlay) close(false); });
    overlay.querySelector('[data-act="cancel"]').addEventListener("click", () => close(false));
    overlay.querySelector('[data-act="ok"]').addEventListener("click", () => close(true));
    document.addEventListener("keydown", function esc(e) {
      if (e.key === "Escape") { close(false); document.removeEventListener("keydown", esc); }
    });
  });
}

/* ============================================================
   SEED THEMES + SEED "THE SHIFT" CAROUSEL
   ============================================================ */
function seedThemes() {
  return {
    "cream-dots": {
      id: "cream-dots", name: "Cream + Dots",
      bgColor: "#f2ede3", inkColor: "#111111",
      dotsEnabled: true, dotColor: "#5c4820", dotOpacity: 22, dotSize: 1.6, dotSpacing: 28,
    },
    "cream-plain": {
      id: "cream-plain", name: "Cream (no dots)",
      bgColor: "#f2ede3", inkColor: "#111111",
      dotsEnabled: false, dotColor: "#5c4820", dotOpacity: 22, dotSize: 1.6, dotSpacing: 28,
    },

/* ============================================================
   STATE (load / save)
   ============================================================ */
const STORAGE_KEY = "carousel-maker.v2";
const STORAGE_KEY_V1 = "carousel-maker.v1";

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed.version === 2) return parsed;
    }
    // try migrating from v1
    const v1raw = localStorage.getItem(STORAGE_KEY_V1);
    if (v1raw) {
      const v1 = JSON.parse(v1raw);
      if (v1.version === 1) {
        const migrated = migrateV1(v1);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(migrated));
        toast("✓ Migrated from v1", 2200);
        return migrated;
      }
    }
  } catch (err) { console.warn("loadState failed:", err); }
  return null;
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch { toast("⚠️ Storage full — compress photos", 3000); }
}

let state = loadState() || freshState();

/* ============================================================
   HELPERS THAT USE STATE
   ============================================================ */
function currentCarousel() {
  return state.carousels[state.currentCarouselId] || Object.values(state.carousels)[0];
}
function slidesOf() { return currentCarousel().slides; }

function getTheme(themeId) {
  if (themeId === "__default__" || !themeId) return state.themes[state.defaultThemeId] || firstTheme();
  return state.themes[themeId] || state.themes[state.defaultThemeId] || firstTheme();
}
function firstTheme() { return Object.values(state.themes)[0]; }

/* ============================================================
   RENDER — PREVIEW
   ============================================================ */
function renderPreview() {
  const root = document.getElementById("slides-preview");
  const car = currentCarousel();
  document.getElementById("current-carousel-title").textContent = car.name;

  root.innerHTML = car.slides.map((s, i) => renderSlideStage(s, i)).join("");

  root.querySelectorAll(".dl").forEach((btn) => {
    btn.addEventListener("click", () => exportSlide(parseInt(btn.dataset.idx, 10)));
  });
}

function renderSlideStage(s, i) {
  const total = slidesOf().length;
  const n = String(i + 1).padStart(2, "0");
  const t = String(total).padStart(2, "0");
  return `
    <div class="slide-stage">
      <div class="slide-stage-meta">
        <span>SLIDE ${n} / ${t}</span>
        <span class="dl" data-idx="${i}">⇣ download png</span>
      </div>
      <div class="slide-box" id="slide-box-${i}">${renderSlideInner(s, i)}</div>
    </div>
  `;
}

function renderSlideInner(s, i) {
  const theme = getTheme(s.themeId);
  const handle = esc(state.handle || "");
  const n = String(i + 1).padStart(2, "0");
  const total = String(slidesOf().length).padStart(2, "0");
  const pageMark = `${n} / ${total}`;

  const dotRgba = hexToRgba(theme.dotColor, theme.dotOpacity / 100);
  const styleVars = [
    `--bg-slide:${theme.bgColor}`,
    `--ink-slide:${theme.inkColor}`,
    `--footer-color:${hexToRgba(theme.inkColor, 0.5)}`,
    `--dot-color:${dotRgba}`,
    `--dot-size:${theme.dotSize}px`,
    `--dot-spacing:${theme.dotSpacing}px`,
  ].join(";");

  const classList = ["slide-inner"];
  if (theme.dotsEnabled && s.type !== "cover") classList.push("dots");
  classList.push(s.type);
  if (s.type === "text") classList.push("order-" + (s.order || "ba"));
  classList.push("align-" + (s.alignment || "left"));

  const iconHTML = renderIconHTML(s.icon);

  if (s.type === "cover") {
    const photoStyle = s.photo ? `--bg-photo: url('${s.photo}')` : "";
    return `
      <div class="slide-inner cover align-${s.alignment || "left"}" data-slide-id="${s.id}" style="${styleVars};${photoStyle}">
        <div class="slide-mark"></div>
        ${iconHTML}
        <div class="cover-copy">
          <div class="slide-headline" style="color:#f6f3ec;font-size:${s.headlineSize || 132}px">${esc(s.headline || "")}</div>
        </div>
        <div class="slide-footer"><span>${handle}</span><span>${pageMark}</span></div>
      </div>`;
  }

  if (s.type === "cta") {
    return `
      <div class="${classList.join(" ")}" data-slide-id="${s.id}" style="${styleVars}">
        <div class="slide-mark"></div>
        ${iconHTML}
        <div class="slide-soft lead" style="font-size:${s.softSize || 46}px">${esc(s.softLead || "")}</div>
        <div class="slide-headline" style="font-size:${s.headlineSize || 280}px">${esc(s.headline || "")}</div>
        <div class="slide-soft why" style="font-size:${s.softSize || 46}px">${esc(s.softWhy || "")}</div>
        <div class="slide-footer"><span>${handle}</span><span>${pageMark}</span></div>
      </div>`;
  }

  if (s.type === "info") {
    const subtitleEl = s.subtitle
      ? `<div class="slide-subtitle" style="font-size:${s.subtitleSize || 44}px">${esc(s.subtitle)}</div>`
      : "";
    const paragraphs = (s.body || "").split(/\n\s*\n/).map(p => `<p>${esc(p.trim())}</p>`).join("");
    return `
      <div class="${classList.join(" ")}" data-slide-id="${s.id}" style="${styleVars}">
        <div class="slide-mark"></div>
        ${iconHTML}
        <div class="slide-headline" style="font-size:${s.headlineSize || 92}px">${esc(s.headline || "")}</div>
        ${subtitleEl}
        <div class="slide-body" style="font-size:${s.bodySize || 38}px">${paragraphs}</div>
        <div class="slide-footer"><span>${handle}</span><span>${pageMark}</span></div>
      </div>`;
  }

  // text
  const softEl = `<div class="slide-soft" style="font-size:${s.softSize || 54}px">${esc(s.soft || "")}</div>`;
  const headlineEl = `<div class="slide-headline" style="font-size:${s.headlineSize || 108}px">${esc(s.headline || "")}</div>`;
  const children = s.order === "ab" ? [softEl, headlineEl] : [headlineEl, softEl];

  return `
    <div class="${classList.join(" ")}" data-slide-id="${s.id}" style="${styleVars}">
      <div class="slide-mark"></div>
      ${iconHTML}
      ${children.join("")}
      <div class="slide-footer"><span>${handle}</span><span>${pageMark}</span></div>
    </div>`;
}

function renderIconHTML(icon) {
  if (!icon || !icon.image) return "";
  const size = icon.size || 180;
  const offset = icon.offset != null ? icon.offset : 120;
  const pos = icon.position || "top-center";
  let style = `width:${size}px;height:${size}px;background-image:url('${icon.image}');`;
  switch (pos) {
    case "top-left":
      style += `top:${offset}px;left:${offset}px;`; break;
    case "top-center":
      style += `top:${offset}px;left:50%;transform:translateX(-50%);`; break;
    case "top-right":
      style += `top:${offset}px;right:${offset}px;`; break;
    case "middle-left":
      style += `top:50%;left:${offset}px;transform:translateY(-50%);`; break;
    case "center":
      style += `top:50%;left:50%;transform:translate(-50%,-50%);`; break;
    case "middle-right":
      style += `top:50%;right:${offset}px;transform:translateY(-50%);`; break;
    case "bottom-left":
      style += `bottom:${offset}px;left:${offset}px;`; break;
    case "bottom-center":
      style += `bottom:${offset}px;left:50%;transform:translateX(-50%);`; break;
    case "bottom-right":
      style += `bottom:${offset}px;right:${offset}px;`; break;
  }
  return `<div class="slide-icon" style="${style}"></div>`;
}

/* ============================================================
   RENDER — CAROUSEL PICKER
   ============================================================ */
function renderCarouselPicker() {
  const sel = document.getElementById("car-picker");
  sel.innerHTML = Object.values(state.carousels)
    .map(c => `<option value="${c.id}" ${c.id === state.currentCarouselId ? "selected" : ""}>${esc(c.name)} · ${c.slides.length} slides</option>`)
    .join("");
  const car = currentCarousel();
  document.getElementById("car-meta").textContent = `${car.slides.length} slide${car.slides.length === 1 ? "" : "s"}`;
}

/* ============================================================
   RENDER — GLOBAL
   ============================================================ */
function renderGlobalControls() {
  const sel = document.getElementById("g-default-theme");
  sel.innerHTML = Object.values(state.themes)
    .map(t => `<option value="${t.id}" ${t.id === state.defaultThemeId ? "selected" : ""}>${esc(t.name)}</option>`)
    .join("");
  document.getElementById("g-handle").value = state.handle || "";
}

/* ============================================================
   RENDER — THEMES LIST
   ============================================================ */
function renderThemesList() {
  const root = document.getElementById("themes-list");
  const themes = Object.values(state.themes);
  document.getElementById("themes-count").textContent = themes.length + " theme" + (themes.length === 1 ? "" : "s");

  root.innerHTML = themes.map(t => themeCardHTML(t)).join("");

  root.querySelectorAll(".card-head").forEach((h) => {
    h.addEventListener("click", (e) => {
      if (e.target.closest(".card-actions")) return;
      h.parentElement.classList.toggle("open");
    });
  });

  root.querySelectorAll("[data-theme-field]").forEach((el) => {
    el.addEventListener("input", () => {
      const card = el.closest(".card");
      const id = card.dataset.themeId;
      const field = el.dataset.themeField;
      let v = el.value;
      if (el.type === "number" || el.type === "range") v = parseFloat(v);
      if (el.type === "checkbox") v = el.checked;
      state.themes[id][field] = v;
      saveState();

      const readout = el.parentElement.querySelector(".slider-val");
      if (readout && (el.type === "range" || el.type === "number")) {
        const unit = el.dataset.unit || "";
        readout.textContent = v + unit;
      }
      // color hex mirror
      if (el.type === "color") {
        const mirror = card.querySelector(`[data-theme-hex-for="${field}"]`);
        if (mirror) mirror.value = el.value;
      }
      renderPreview();
      // Also re-sync the "preview swatch" in the theme head:
      renderCarouselPicker(); // no-op for themes but safe
      // Targeted swatch refresh:
      const swatchEl = card.querySelector(".theme-swatch");
      if (swatchEl) swatchEl.style.background = state.themes[id].bgColor;
    });
  });

  root.querySelectorAll("[data-theme-hex]").forEach((el) => {
    el.addEventListener("input", () => {
      const card = el.closest(".card");
      const id = card.dataset.themeId;
      const field = el.dataset.themeHex;
      const v = sanitizeHex(el.value);
      if (!v) return;
      state.themes[id][field] = v;
      card.querySelector(`[data-theme-field="${field}"]`).value = v;
      saveState();
      renderPreview();
      const swatchEl = card.querySelector(".theme-swatch");
      if (swatchEl) swatchEl.style.background = state.themes[id].bgColor;
    });
  });

  root.querySelectorAll("[data-theme-rename]").forEach((el) => {
    el.addEventListener("click", async (e) => {
      e.stopPropagation();
      const id = el.closest(".card").dataset.themeId;
      const name = await askName("Rename theme", state.themes[id].name);
      if (!name) return;
      state.themes[id].name = name;
      saveState();
      renderThemesList(); renderGlobalControls(); renderSlidesList(); renderCarouselPicker();
    });
  });

  root.querySelectorAll("[data-theme-duplicate]").forEach((el) => {
    el.addEventListener("click", (e) => {
      e.stopPropagation();
      const id = el.closest(".card").dataset.themeId;
      const src = state.themes[id];
      const newId = uid("theme");
      state.themes[newId] = { ...structuredClone(src), id: newId, name: src.name + " (copy)" };
      saveState();
      renderThemesList(); renderGlobalControls(); renderSlidesList();
      toast("✓ Theme duplicated");
    });
  });

  root.querySelectorAll("[data-theme-delete]").forEach((el) => {
    el.addEventListener("click", async (e) => {
      e.stopPropagation();
      const id = el.closest(".card").dataset.themeId;
      if (Object.keys(state.themes).length <= 1) { toast("Can't delete last theme"); return; }
      const ok = await askConfirm(`Delete theme "${state.themes[id].name}"? Slides using it will fall back to the default.`);
      if (!ok) return;
      delete state.themes[id];
      if (state.defaultThemeId === id) state.defaultThemeId = Object.keys(state.themes)[0];
      Object.values(state.carousels).forEach(c => c.slides.forEach(s => { if (s.themeId === id) s.themeId = "__default__"; }));
      saveState();
      renderThemesList(); renderGlobalControls(); renderSlidesList(); renderPreview();
    });
  });
}

/* ============================================================
   RENDER — SLIDES LIST
   ============================================================ */
function renderSlidesList() {
  const root = document.getElementById("slides-list");
  const slides = slidesOf();
  document.getElementById("slides-count").textContent = slides.length + " slide" + (slides.length === 1 ? "" : "s");

  root.innerHTML = slides.map((s, i) => slideCardHTML(s, i)).join("");

  root.querySelectorAll(".card-head").forEach((h) => {
    h.addEventListener("click", (e) => {
      if (e.target.closest(".card-actions")) return;
      h.parentElement.classList.toggle("open");
    });
  });

  root.querySelectorAll("[data-slide-field]").forEach((el) => {
    el.addEventListener("input", () => {
      const idx = parseInt(el.closest(".card").dataset.idx, 10);
      const field = el.dataset.slideField;
      let v = el.value;
      if (el.type === "number" || el.type === "range") v = parseFloat(v);
      slidesOf()[idx][field] = v;
      saveState();
      renderPreview();
      const readout = el.parentElement.querySelector(".slider-val");
      if (readout && (el.type === "range" || el.type === "number")) {
        readout.textContent = v + (el.dataset.unit || "px");
      }
    });
  });

  root.querySelectorAll("[data-slide-chip]").forEach((el) => {
    el.addEventListener("click", () => {
      const idx = parseInt(el.closest(".card").dataset.idx, 10);
      const field = el.dataset.slideField;
      slidesOf()[idx][field] = el.dataset.slideChip;
      saveState();
      renderSlidesList(); renderPreview();
    });
  });

  root.querySelectorAll("[data-slide-delete]").forEach((el) => {
    el.addEventListener("click", async (e) => {
      e.stopPropagation();
      const idx = parseInt(el.closest(".card").dataset.idx, 10);
      if (slidesOf().length <= 1) { toast("Can't delete last slide"); return; }
      const ok = await askConfirm(`Delete slide ${idx + 1}?`);
      if (!ok) return;
      slidesOf().splice(idx, 1);
      saveState(); renderSlidesList(); renderPreview();
    });
  });

  root.querySelectorAll("[data-slide-up], [data-slide-down]").forEach((el) => {
    el.addEventListener("click", (e) => {
      e.stopPropagation();
      const idx = parseInt(el.closest(".card").dataset.idx, 10);
      const delta = el.dataset.slideUp !== undefined ? -1 : 1;
      const j = idx + delta;
      const sl = slidesOf();
      if (j < 0 || j >= sl.length) return;
      [sl[idx], sl[j]] = [sl[j], sl[idx]];
      saveState(); renderSlidesList(); renderPreview();
    });
  });

  root.querySelectorAll("[data-slide-photo]").forEach((el) => {
    el.addEventListener("change", (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      const idx = parseInt(el.closest(".card").dataset.idx, 10);
      const reader = new FileReader();
      reader.onload = () => {
        slidesOf()[idx].photo = reader.result;
        saveState(); renderSlidesList(); renderPreview();
        toast("Photo loaded");
      };
      reader.readAsDataURL(file);
    });
  });

  root.querySelectorAll("[data-slide-photo-clear]").forEach((el) => {
    el.addEventListener("click", (e) => {
      e.stopPropagation();
      const idx = parseInt(el.closest(".card").dataset.idx, 10);
      slidesOf()[idx].photo = null;
      saveState(); renderSlidesList(); renderPreview();
    });
  });

  // Icon upload
  root.querySelectorAll("[data-slide-icon]").forEach((el) => {
    el.addEventListener("change", (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      const idx = parseInt(el.closest(".card").dataset.idx, 10);
      const reader = new FileReader();
      reader.onload = () => {
        const s = slidesOf()[idx];
        s.icon = s.icon || { position: "top-center", size: 180, offset: 120 };
        s.icon.image = reader.result;
        saveState(); renderSlidesList(); renderPreview();
        toast("Icon loaded");
      };
      reader.readAsDataURL(file);
    });
  });
  root.querySelectorAll("[data-slide-icon-clear]").forEach((el) => {
    el.addEventListener("click", (e) => {
      e.stopPropagation();
      const idx = parseInt(el.closest(".card").dataset.idx, 10);
      slidesOf()[idx].icon = null;
      saveState(); renderSlidesList(); renderPreview();
    });
  });
  root.querySelectorAll("[data-icon-field]").forEach((el) => {
    el.addEventListener("input", () => {
      const idx = parseInt(el.closest(".card").dataset.idx, 10);
      const field = el.dataset.iconField;
      let v = el.value;
      if (el.type === "number" || el.type === "range") v = parseFloat(v);
      const s = slidesOf()[idx];
      if (!s.icon) return;
      s.icon[field] = v;
      saveState(); renderPreview();
      const readout = el.parentElement.querySelector(".slider-val");
      if (readout && (el.type === "range" || el.type === "number")) readout.textContent = v + "px";
    });
  });
  root.querySelectorAll("[data-icon-chip]").forEach((el) => {
    el.addEventListener("click", () => {
      const idx = parseInt(el.closest(".card").dataset.idx, 10);
      const s = slidesOf()[idx];
      if (!s.icon) return;
      s.icon.position = el.dataset.iconChip;
      saveState(); renderSlidesList(); renderPreview();
    });
  });
}

function slideCardHTML(s, i) {
  const typeLabel = { cover: "Photo cover", text: "Text", cta: "CTA (3-line)", info: "Info (editorial)" }[s.type] || s.type;
  const preview = {
    cover: (s.headline || "").split("\n")[0] || "(no text)",
    text: ((s.order === "ab" ? s.soft : s.headline) || "").split("\n")[0] || "(empty)",
    cta: s.headline || "(empty)",
    info: s.headline || "(empty)",
  }[s.type];

  const alignChips = `
    <div class="field">
      <label>Alignment</label>
      <div class="chip-group">
        ${["left", "center", "right"].map(a =>
          `<span class="chip ${s.alignment === a ? "active" : ""}" data-slide-field="alignment" data-slide-chip="${a}">${a}</span>`
        ).join("")}
      </div>
    </div>`;

  const themeDropdown = `
    <div class="field">
      <label>Theme</label>
      <select data-slide-field="themeId">
        <option value="__default__" ${s.themeId === "__default__" || !s.themeId ? "selected" : ""}>Inherit default (${esc(getTheme("__default__").name)})</option>
        ${Object.values(state.themes).map(t =>
          `<option value="${t.id}" ${s.themeId === t.id ? "selected" : ""}>${esc(t.name)}</option>`
        ).join("")}
      </select>
    </div>`;

  const iconBlock = `
    <div class="field">
      <label>Icon / decorative image (optional)</label>
      <input type="file" data-slide-icon accept="image/*">
      ${s.icon && s.icon.image ? `
        <div style="margin-top:10px">
          <div class="field">
            <label>Position</label>
            <div class="chip-group">
              ${["top-left","top-center","top-right","middle-left","center","middle-right","bottom-left","bottom-center","bottom-right"].map(p =>
                `<span class="chip ${s.icon.position === p ? "active" : ""}" data-icon-chip="${p}">${p.replace("-", " ")}</span>`
              ).join("")}
            </div>
          </div>
          <div class="field">
            <label>Size <span class="slider-val">${s.icon.size || 180}px</span></label>
            <input type="range" data-icon-field="size" min="40" max="500" step="4" value="${s.icon.size || 180}">
          </div>
          <div class="field">
            <label>Offset from edge <span class="slider-val">${s.icon.offset != null ? s.icon.offset : 120}px</span></label>
            <input type="range" data-icon-field="offset" min="0" max="300" step="4" value="${s.icon.offset != null ? s.icon.offset : 120}">
          </div>
          <button class="btn small danger" data-slide-icon-clear>Remove icon</button>
        </div>
      ` : ""}
    </div>`;

  let body = "";
  if (s.type === "cover") {
    body = `
      <div class="field">
        <label>Headline (Inter Black)</label>
        <textarea data-slide-field="headline">${esc(s.headline || "")}</textarea>
      </div>
      <div class="field">
        <label>Headline size <span class="slider-val">${s.headlineSize || 132}px</span></label>
        <input type="range" data-slide-field="headlineSize" min="40" max="260" step="2" value="${s.headlineSize || 132}">
      </div>
      ${themeDropdown}
      ${alignChips}
      <div class="field">
        <label>Photo background</label>
        <input type="file" data-slide-photo accept="image/*">
        ${s.photo ? `<div style="margin-top:8px"><button class="btn small danger" data-slide-photo-clear>Remove photo</button></div>` : ""}
      </div>
      ${iconBlock}
    `;
  } else if (s.type === "cta") {
    body = `
      <div class="field">
        <label>Lead (top italic)</label>
        <textarea data-slide-field="softLead">${esc(s.softLead || "")}</textarea>
      </div>
      <div class="field">
        <label>Headline (huge, Inter Black)</label>
        <textarea data-slide-field="headline">${esc(s.headline || "")}</textarea>
      </div>
      <div class="field">
        <label>Why (bottom italic)</label>
        <textarea data-slide-field="softWhy">${esc(s.softWhy || "")}</textarea>
      </div>
      <div class="field">
        <label>Headline size <span class="slider-val">${s.headlineSize || 280}px</span></label>
        <input type="range" data-slide-field="headlineSize" min="80" max="400" step="2" value="${s.headlineSize || 280}">
      </div>
      <div class="field">
        <label>Italic size <span class="slider-val">${s.softSize || 46}px</span></label>
        <input type="range" data-slide-field="softSize" min="20" max="100" step="1" value="${s.softSize || 46}">
      </div>
      ${themeDropdown}
      ${alignChips}
      ${iconBlock}
    `;
  } else if (s.type === "info") {
    body = `
      <div class="field">
        <label>Title (Inter Black)</label>
        <textarea data-slide-field="headline">${esc(s.headline || "")}</textarea>
      </div>
      <div class="field">
        <label>Subtitle — optional italic intro (Apple Garamond italic)</label>
        <textarea data-slide-field="subtitle">${esc(s.subtitle || "")}</textarea>
      </div>
      <div class="field">
        <label>Body — separate paragraphs with a blank line (serif, regular)</label>
        <textarea data-slide-field="body" style="min-height:120px">${esc(s.body || "")}</textarea>
        <div class="hint">Leave one empty line between paragraphs.</div>
      </div>
      <div class="field">
        <label>Title size <span class="slider-val">${s.headlineSize || 92}px</span></label>
        <input type="range" data-slide-field="headlineSize" min="40" max="180" step="2" value="${s.headlineSize || 92}">
      </div>
      <div class="field">
        <label>Subtitle size <span class="slider-val">${s.subtitleSize || 44}px</span></label>
        <input type="range" data-slide-field="subtitleSize" min="20" max="80" step="1" value="${s.subtitleSize || 44}">
      </div>
      <div class="field">
        <label>Body size <span class="slider-val">${s.bodySize || 38}px</span></label>
        <input type="range" data-slide-field="bodySize" min="20" max="60" step="1" value="${s.bodySize || 38}">
      </div>
      ${themeDropdown}
      ${alignChips}
      ${iconBlock}
    `;
  } else {
    body = `
      <div class="field">
        <label>Order</label>
        <div class="chip-group">
          <span class="chip ${s.order === "ab" ? "active" : ""}" data-slide-field="order" data-slide-chip="ab">Italic on top</span>
          <span class="chip ${s.order === "ba" ? "active" : ""}" data-slide-field="order" data-slide-chip="ba">Italic on bottom</span>
        </div>
      </div>
      <div class="field">
        <label>Italic line (Apple Garamond)</label>
        <textarea data-slide-field="soft">${esc(s.soft || "")}</textarea>
      </div>
      <div class="field">
        <label>Headline (Inter Black)</label>
        <textarea data-slide-field="headline">${esc(s.headline || "")}</textarea>
      </div>
      <div class="field">
        <label>Headline size <span class="slider-val">${s.headlineSize || 108}px</span></label>
        <input type="range" data-slide-field="headlineSize" min="40" max="260" step="2" value="${s.headlineSize || 108}">
      </div>
      <div class="field">
        <label>Italic size <span class="slider-val">${s.softSize || 54}px</span></label>
        <input type="range" data-slide-field="softSize" min="20" max="120" step="1" value="${s.softSize || 54}">
      </div>
      ${themeDropdown}
      ${alignChips}
      ${iconBlock}
    `;
  }

  return `
    <div class="card" data-idx="${i}">
      <div class="card-head">
        <div>
          <h3>Slide ${i + 1} · ${typeLabel}</h3>
          <div class="sub">${esc(preview.substring(0, 44))}${preview.length > 44 ? "…" : ""}</div>
        </div>
        <div class="card-actions">
          <button class="btn small" data-slide-up title="Move up">↑</button>
          <button class="btn small" data-slide-down title="Move down">↓</button>
          <button class="btn small danger" data-slide-delete title="Delete">✕</button>
          <span class="chev">▾</span>
        </div>
      </div>
      <div class="card-body">${body}</div>
    </div>
  `;
}

/* ============================================================
   CAROUSEL ACTIONS
   ============================================================ */
document.getElementById("car-picker").addEventListener("change", (e) => {
  state.currentCarouselId = e.target.value;
  saveState(); renderAll();
});
document.getElementById("car-new").addEventListener("click", async () => {
  const name = await askName("Name this new carousel", "Untitled carousel");
  if (!name) return;
  const id = uid("car");
  state.carousels[id] = {
    id, name,
    slides: [
      { id: uid("s"), type: "cover", themeId: "__default__", alignment: "left", photo: null, headline: "Hook line\ngoes here.", headlineSize: 132, icon: null },
    ]
  };
  state.currentCarouselId = id;
  saveState(); renderAll();
  toast("✓ Carousel created");
});
document.getElementById("car-dup").addEventListener("click", () => {
  const src = currentCarousel();
  const id = uid("car");
  state.carousels[id] = { ...structuredClone(src), id, name: src.name + " (copy)" };
  state.carousels[id].slides.forEach(s => s.id = uid("s"));
  state.currentCarouselId = id;
  saveState(); renderAll();
  toast("✓ Carousel duplicated");
});
document.getElementById("car-rename").addEventListener("click", async () => {
  const car = currentCarousel();
  const name = await askName("Rename carousel", car.name);
  if (!name) return;
  car.name = name;
  saveState(); renderCarouselPicker(); renderPreview();
});
document.getElementById("car-delete").addEventListener("click", async () => {
  if (Object.keys(state.carousels).length <= 1) { toast("Can't delete last carousel"); return; }
  const car = currentCarousel();
  const ok = await askConfirm(`Delete "${car.name}"? This can't be undone.`);
  if (!ok) return;
  delete state.carousels[car.id];
  state.currentCarouselId = Object.keys(state.carousels)[0];
  saveState(); renderAll();
});

   THEME ACTIONS (new button)

document.getElementById("theme-new").addEventListener("click", async () => {

document.getElementById("g-default-theme").addEventListener("change", (e) => {

/* ============================================================
   ADD SLIDE
   ============================================================ */
function addSlide(type) {
  const id = uid("s");
  const base = { id, type, themeId: "__default__", alignment: "left", icon: null };
  let slide;
  if (type === "cover") slide = { ...base, photo: null, headline: "New cover headline", headlineSize: 132 };
  else if (type === "cta") slide = { ...base, alignment: "center", softLead: "Lead line —", headline: "CTA.", softWhy: "Why to stay.", softSize: 46, headlineSize: 280 };
  else if (type === "info") slide = {
    ...base,
    headline: "TOOL NAME",
    subtitle: "Short italic intro.",
    body: "First paragraph goes here — explain what it is.\n\nSecond paragraph — explain how you use it.\n\nThird paragraph — a tip, a warning, or a recommendation.",
    headlineSize: 92, subtitleSize: 44, bodySize: 38,
  };
  else slide = { ...base, order: "ba", soft: "Italic line.", headline: "Your headline.", softSize: 54, headlineSize: 108 };
  currentCarousel().slides.push(slide);
  saveState(); renderSlidesList(); renderPreview(); renderCarouselPicker();
}
document.querySelectorAll("[data-add]").forEach((el) => {
  el.addEventListener("click", () => addSlide(el.dataset.add));
});

/* ============================================================
   EXPORT
   ============================================================ */
async function exportSlide(i) {
  const stage = document.getElementById("slide-box-" + i);
  const inner = stage?.querySelector(".slide-inner");
  if (!inner) return;
  toast("Rendering PNG…");
  await document.fonts.ready;

  const clone = inner.cloneNode(true);
  clone.style.transform = "none";
  clone.style.position = "fixed";
  clone.style.top = "-20000px";
  clone.style.left = "0";
  clone.style.width = "1080px";
  clone.style.height = "1350px";
  document.body.appendChild(clone);
  try {
    const canvas = await html2canvas(clone, { width: 1080, height: 1350, scale: 1, backgroundColor: null, useCORS: true, logging: false });
    const car = currentCarousel();
    const safeName = car.name.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
    const link = document.createElement("a");
    link.download = `${safeName}-slide-${String(i + 1).padStart(2, "0")}.png`;
    link.href = canvas.toDataURL("image/png");
    link.click();
    toast("✓ Slide " + (i + 1) + " downloaded");
  } catch (err) {
    console.error(err);
    toast("✕ Export failed: " + err.message, 3000);
  } finally {
    document.body.removeChild(clone);
  }
}

async function exportAll() {
  const n = currentCarousel().slides.length;
  for (let i = 0; i < n; i++) {
    await exportSlide(i);
    await new Promise(r => setTimeout(r, 350));
  }
  toast("✓ All slides downloaded");
}
document.getElementById("export-all").addEventListener("click", exportAll);

/* ============================================================
   SAVE / LOAD / RESET
   ============================================================ */
function saveJSON() {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], { type: "application/json" });
  const link = document.createElement("a");
  link.download = "carousel-library.json";
  link.href = URL.createObjectURL(blob);
  link.click();
  URL.revokeObjectURL(link.href);
  toast("✓ Library saved");
}
document.getElementById("save-json").addEventListener("click", saveJSON);

document.getElementById("load-json").addEventListener("click", () => document.getElementById("load-json-file").click());
document.getElementById("load-json-file").addEventListener("change", (e) => {
  const file = e.target.files?.[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(reader.result);
      if (parsed.version === 1) { state = migrateV1(parsed); toast("✓ Imported + migrated from v1"); }
      else if (parsed.version === 2) { state = parsed; toast("✓ Library imported"); }
      else throw new Error("Unknown version");
      saveState(); renderAll();
    } catch (err) { toast("✕ Invalid JSON: " + err.message, 3000); }
  };
  reader.readAsText(file);
  e.target.value = "";
});

document.getElementById("reset").addEventListener("click", async () => {
  const ok = await askConfirm("Reset everything to defaults? This wipes your entire library of carousels and themes.", "Reset everything");
  if (!ok) return;
  state = freshState();
  saveState(); renderAll();
  toast("✓ Reset to defaults");
});

/* ============================================================
   RENDER ALL + INIT
   ============================================================ */
function renderAll() {
  renderCarouselPicker();
  renderGlobalControls();
  renderThemesList();
  renderSlidesList();
  renderPreview();
}
renderAll();
</script>
